name: Seed Pipeline Automations (one-shot)

# Loads api-php/data/pipeline-automations.json into resources(type=workflow)
# by hitting the /api/cron/seed-pipeline-automations route (token-protected
# by the first 16 chars of jwt_secret).
#
# Idempotent — workflows upsert by slug. Re-run anytime after editing the JSON.
#
# Inputs:
#   dry_run = true  → preview only (no DB writes)
#   dry_run = false → apply
#
# JWT_SECRET must be set in repo secrets (gh secret set JWT_SECRET).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only? (true = preview, false = apply)'
        type: boolean
        default: true
      org_id:
        description: 'Organization ID to seed into'
        default: '1'

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for jq sanity check on JSON)
        uses: actions/checkout@v4

      - name: Derive token + hit seeder route
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${JWT_SECRET:-}" ]; then
            echo "::error::JWT_SECRET secret is empty — set it via gh secret set JWT_SECRET"
            exit 1
          fi
          TOKEN="${JWT_SECRET:0:16}"
          ORG_ID="${{ inputs.org_id }}"
          DRY="${{ inputs.dry_run }}"

          URL="https://netwebmedia.com/api/cron/seed-pipeline-automations?token=${TOKEN}&org_id=${ORG_ID}"
          if [ "$DRY" = "true" ]; then
            URL="${URL}&dry=1"
            echo "::notice::Mode: DRY RUN (no DB writes)"
          else
            echo "::notice::Mode: APPLY (writes to DB)"
          fi

          BODY_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$BODY_FILE" -w "%{http_code}" \
            -A "Mozilla/5.0 (NWM-seed-automations-action)" \
            --max-time 60 "$URL")

          echo ""
          echo "=== HTTP $HTTP_CODE ==="
          jq . "$BODY_FILE" 2>/dev/null || cat "$BODY_FILE"
          echo "=== End response ==="

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Seeder returned HTTP $HTTP_CODE"
            exit 1
          fi

          INSERTED=$(jq -r '.inserted // 0' "$BODY_FILE")
          UPDATED=$(jq  -r '.updated  // 0' "$BODY_FILE")
          SKIPPED=$(jq  -r '.skipped  // 0' "$BODY_FILE")
          EXPECTED=$(jq -r '.expected // 0' "$BODY_FILE")

          echo ""
          echo "── Summary ──"
          echo "Expected: $EXPECTED  Inserted: $INSERTED  Updated: $UPDATED  Skipped: $SKIPPED"

          ACCOUNTED=$((INSERTED + UPDATED))
          if [ "$ACCOUNTED" != "$EXPECTED" ]; then
            echo "::warning::Mismatch — expected $EXPECTED but accounted for $ACCOUNTED"
          fi
          if [ "$SKIPPED" != "0" ]; then
            echo "::warning::Seeder skipped $SKIPPED workflows — see body above"
          fi
