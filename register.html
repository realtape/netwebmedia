<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Create account · NetWebMedia</title>
<link rel="icon" type="image/svg+xml" href="/assets/nwm-logo.svg" />
<style>
  :root {
    --bg: #0b1020; --card: #121933; --fg: #eaf0ff; --muted: #8892b0;
    --accent: #6c5ce7; --accent2: #00b894; --err: #ff6b6b; --ok: #00d28f;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--fg);
    background: radial-gradient(1000px 600px at 15% 10%, #1a2555 0%, transparent 60%),
                radial-gradient(900px 500px at 85% 90%, #0f2942 0%, transparent 60%), var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 460px; background: var(--card);
    border: 1px solid var(--border); border-radius: 18px; padding: 36px 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .brand-logo { width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center; color: white; font-weight: 800; }
  .brand-text { font-weight: 700; font-size: 18px; }
  h1 { margin: 0 0 6px; font-size: 22px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 6px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.04); color: var(--fg);
    border: 1px solid var(--border); outline: none; font-size: 14px;
  }
  input:focus { border-color: var(--accent); background: rgba(108,92,231,0.08); }
  .btn {
    margin-top: 20px; width: 100%; padding: 12px 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), #8475ff);
    color: white; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .btn:disabled { opacity: 0.6; cursor: wait; }
  .alt { color: var(--muted); font-size: 13px; text-align: center; margin-top: 14px; }
  .alt a { color: var(--fg); text-decoration: none; border-bottom: 1px dashed var(--muted); }
  .msg { margin-top: 12px; font-size: 13px; min-height: 16px; }
  .msg.err { color: var(--err); }
  .msg.ok  { color: var(--ok); }
</style>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V71R6PD7C0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-V71R6PD7C0', { anonymize_ip: true });
  </script>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">N</div>
      <div class="brand-text">NetWebMedia</div>
    </div>
    <h1>Create your account</h1>
    <div class="sub">Get your own CMS &amp; CRM workspace in seconds.</div>

    <form id="registerForm">
      <label for="name">Full name</label>
      <input id="name" type="text" required autocomplete="name" />

      <label for="email">Work email</label>
      <input id="email" type="email" required autocomplete="email" />

      <label for="password">Password (min 8 chars)</label>
      <input id="password" type="password" required minlength="8" autocomplete="new-password" />

      <button class="btn" id="submitBtn" type="submit">Create account</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="alt">Already have one? <a href="/login.html">Sign in</a></div>
  </div>

  <script src="/js/api-client.js"></script>
  <script>
    (function () {
      var form = document.getElementById('registerForm');
      var name = document.getElementById('name');
      var email = document.getElementById('email');
      var pass = document.getElementById('password');
      var btn = document.getElementById('submitBtn');
      var msg = document.getElementById('msg');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        btn.disabled = true;
        msg.className = 'msg';
        msg.textContent = 'Creating your account…';
        window.NWMApi.register(email.value.trim(), pass.value, name.value.trim())
          .then(function (r) {
            msg.className = 'msg ok';
            msg.textContent = 'Account created — redirecting…';
            setTimeout(function () { location.href = '/app/'; }, 400);
          })
          .catch(function (err) {
            msg.className = 'msg err';
            msg.textContent = err.message || 'Registration failed.';
            btn.disabled = false;
          });
      });
    })();
  </script>
<script src="assets/nwm-i18n.js" defer></script>
<script src="js/main.js?v=3" defer></script>
</body>
</html>
