<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NetWebMedia · AI Lead-Gen Carousel</title>
<style>
  :root{ --navy:#010A29; --orange:#FF671F; --cream:#F4F1EA; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#020B22; color:var(--cream); font-family:'Helvetica Neue',Arial,sans-serif; padding:32px 20px 80px; }
  header{ max-width:1120px; margin:0 auto 20px; }
  h1{ font-size:22px; font-weight:500; margin:0 0 4px; }
  p.sub{ color:#8499B8; margin:0 0 20px; font-size:15px; }
  .bar{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  button{ font:inherit; font-weight:700; border:0; border-radius:10px; padding:12px 18px; cursor:pointer; }
  .primary{ background:var(--orange); color:var(--navy); }
  .ghost{ background:#0E2547; color:var(--cream); }
  .grid{ max-width:1120px; margin:24px auto 0; display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:24px; }
  .card{ background:#0A1830; border:1px solid #163059; border-radius:14px; padding:14px; }
  .card svg{ width:100%; height:auto; border-radius:8px; display:block; }
  .card .row{ display:flex; gap:8px; margin-top:12px; }
  .card .row button{ flex:1; padding:9px 0; font-size:13px; border-radius:8px; }
  .name{ font-size:13px; color:#8499B8; margin:0 0 10px; letter-spacing:1px; }
  #status{ max-width:1120px; margin:14px auto 0; color:#8499B8; font-size:14px; min-height:20px; }
</style>
</head>
<body>
<header>
  <h1>NetWebMedia &mdash; AI lead-gen carousel</h1>
  <p class="sub">6 slides &middot; 1080&times;1350 (4:5) &middot; navy #010F3B + orange #FF671F. Click "Download all PNGs" to export the full deck, ready to post to Instagram.</p>
  <div class="bar">
    <button class="primary" onclick="downloadAll('png')">Download all PNGs</button>
    <button class="ghost" onclick="downloadAll('svg')">Download all SVGs</button>
    <button class="ghost" onclick="downloadPipeline()">Download IG pipeline PNGs (d-slide-1…6)</button>
  </div>
  <div id="status"></div>
</header>

<div class="grid" id="grid"></div>

<script>
const SLIDES = ["01_cover","02_what","03_examples","04_comparison","05_how_to","06_cta"];
const W=1080, H=1350;
const grid = document.getElementById('grid');
const statusEl = document.getElementById('status');

function svgMarkup(name){ return document.getElementById('svg_'+name).querySelector('svg'); }

function toPng(name, outName){
  return new Promise((resolve,reject)=>{
    const svg = svgMarkup(name);
    const xml = new XMLSerializer().serializeToString(svg);
    const url = 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement('canvas'); c.width=W; c.height=H;
      const ctx = c.getContext('2d'); ctx.drawImage(img,0,0,W,H);
      c.toBlob(b=>{ trigger(URL.createObjectURL(b), (outName||name)+'.png'); resolve(); }, 'image/png');
    };
    img.onerror = reject;
    img.src = url;
  });
}
async function downloadPipeline(){
  statusEl.textContent = 'Exporting d-slide-1…6.png for the IG pipeline…';
  for(let i=0;i<SLIDES.length;i++){ await toPng(SLIDES[i], 'd-slide-'+(i+1)); await new Promise(r=>setTimeout(r,450)); }
  statusEl.textContent = 'Done. Drop these 6 files into assets/social/carousels/.';
}
function toSvg(name){
  const svg = svgMarkup(name);
  const xml = '<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(svg);
  const blob = new Blob([xml], {type:'image/svg+xml'});
  trigger(URL.createObjectURL(blob), name+'.svg');
}
function trigger(href, filename){
  const a=document.createElement('a'); a.href=href; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
}
async function downloadAll(kind){
  statusEl.textContent = 'Exporting '+SLIDES.length+' '+kind.toUpperCase()+' files…';
  for(let i=0;i<SLIDES.length;i++){
    if(kind==='png'){ await toPng(SLIDES[i]); } else { toSvg(SLIDES[i]); }
    await new Promise(r=>setTimeout(r,450));
  }
  statusEl.textContent = 'Done. Check your Downloads folder.';
}

SLIDES.forEach(name=>{
  const tpl = document.getElementById('svg_'+name).innerHTML;
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = '<p class="name">'+name.toUpperCase()+'</p>'+tpl+
    '<div class="row"><button class="primary" data-n="'+name+'" data-k="png">PNG</button>'+
    '<button class="ghost" data-n="'+name+'" data-k="svg">SVG</button></div>';
  grid.appendChild(card);
});
grid.addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  if(b.dataset.k==='png') toPng(b.dataset.n); else toSvg(b.dataset.n);
});
</script>
