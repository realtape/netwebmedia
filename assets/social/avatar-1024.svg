<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>NetWebMedia profile avatar</title>
  <desc>Square brand avatar for social profiles. Navy #010F3B background, Orange #FF671F accent. 1024x1024.</desc>
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF671F"/>
      <stop offset="100%" stop-color="#ff8c4a"/>
    </linearGradient>
  </defs>
  <!-- Navy background, full bleed -->
  <rect width="1024" height="1024" fill="#010F3B"/>
  <!-- Orange ring for brand pop -->
  <circle cx="512" cy="512" r="370" fill="none" stroke="url(#orangeGradient)" stroke-width="14"/>
  <!-- Inner navy circle -->
  <circle cx="512" cy="512" r="356" fill="#010F3B"/>
  <!-- "N" wordmark, dominant brand letter -->
  <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
        font-family="'Poppins', 'Inter', 'Arial Black', sans-serif"
        font-weight="800" font-size="440" fill="url(#orangeGradient)"
        letter-spacing="-12">N</text>
  <!-- Subtle "WebMedia" subscript at bottom safe-area -->
  <text x="512" y="850" text-anchor="middle"
        font-family="'Inter', 'Arial', sans-serif"
        font-weight="700" font-size="58" fill="#eaf0ff" letter-spacing="6">NETWEBMEDIA</text>
</svg>
