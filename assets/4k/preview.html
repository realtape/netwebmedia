<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NWM Circle Logo — 4K Preview</title>
<style>
  :root{--navy:#010F3B;--orange:#FF671F;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,Arial,sans-serif;color:#0a1f3d;background:#eef1f6}
  header{padding:24px 32px;background:var(--navy);color:#fff}
  header h1{font-size:20px;font-weight:700}
  header p{opacity:.7;font-size:13px;margin-top:4px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:32px;max-width:1200px;margin:0 auto}
  .card{border-radius:14px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.08);background:#fff}
  .swatch{display:flex;align-items:center;justify-content:center;padding:36px;min-height:260px}
  .swatch img{width:200px;height:200px;display:block}
  .light{background:#fff}
  .navy{background:var(--navy)}
  .orange{background:var(--orange)}
  .checker{background:
    linear-gradient(45deg,#ccc 25%,transparent 25%),
    linear-gradient(-45deg,#ccc 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ccc 75%),
    linear-gradient(-45deg,transparent 75%,#ccc 75%);
    background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0}
  .label{padding:12px 16px;font-size:13px;font-weight:600;border-top:1px solid #eef1f6}
  .scales{display:flex;align-items:flex-end;gap:28px;flex-wrap:wrap;padding:36px;background:#fff}
  .scales figure{text-align:center}
  .scales img{display:block}
  .scales figcaption{font-size:12px;color:#64748b;margin-top:8px}
  .s512{width:512px;height:512px}.s256{width:256px;height:256px}
  .s128{width:128px;height:128px}.s64{width:64px;height:64px}.s32{width:32px;height:32px}
  section h2{padding:24px 32px 0;font-size:15px;color:#334155}
</style>
</head>
<body>
<header>
  <h1>NWM Circle Logo — 4K master preview</h1>
  <p>Source: assets/4k/nwm-circle-4k.png · 4096×4096 · transparent PNG (shown downscaled in browser; the file is full 4K)</p>
</header>

<section>
  <h2>On backgrounds</h2>
  <div class="grid">
    <div class="card"><div class="swatch checker"><img src="nwm-circle-4k.png" alt="on transparent"></div><div class="label">Transparent (real alpha)</div></div>
    <div class="card"><div class="swatch light"><img src="nwm-circle-4k.png" alt="on white"></div><div class="label">White</div></div>
    <div class="card"><div class="swatch navy"><img src="nwm-circle-4k.png" alt="on navy"></div><div class="label">Brand navy #010F3B</div></div>
  </div>
</section>

<section>
  <h2>Scale / legibility test</h2>
  <div class="scales">
    <figure><img class="s512" src="nwm-circle-4k.png"><figcaption>512px</figcaption></figure>
    <figure><img class="s256" src="nwm-circle-4k.png"><figcaption>256px</figcaption></figure>
    <figure><img class="s128" src="nwm-circle-4k.png"><figcaption>128px</figcaption></figure>
    <figure><img class="s64" src="nwm-circle-4k.png"><figcaption>64px (favicon)</figcaption></figure>
    <figure><img class="s32" src="nwm-circle-4k.png"><figcaption>32px</figcaption></figure>
  </div>
</section>
</body>
</html>
