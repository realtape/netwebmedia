name: Deploy CRM to production (DEPRECATED — see deploy-site-root.yml)

# DEPRECATED 2026-04-25.
# This workflow uploads via CPANEL_FTP_USER which is chrooted to
# /public_html/companies/, so files land at /companies/crm-vanilla/api/...
# instead of /crm-vanilla/api/... where app.netwebmedia.com actually
# serves from. That meant config.local.php (DB_PASS) never reached the
# live CRM and every API handler returned 500.
#
# As of commit 6f37f2258, deploy-site-root.yml deploys crm-vanilla/** via
# CPANEL_FTP_ROOT_USER which can write the canonical path, AND generates
# config.local.php for the CRM. This workflow is kept ONLY for manual
# workflow_dispatch as a fallback if the root FTP user is unavailable.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (log only, no upload)"
        required: false
        default: "false"
  # Push trigger removed — deploy-site-root.yml handles crm-vanilla/** now.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.local.php from secrets
        env:
          DB_PASS: ${{ secrets.CRM_DB_PASSWORD }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 - <<'PYEOF' > crm-vanilla/api/config.local.php
          import os
          def e(v: str) -> str: return (v or '').replace("\\", "\\\\").replace("'", "\\'")
          print("<?php")
          print("// Auto-generated during deploy. DO NOT EDIT.")
          print(f"define('DB_PASS', '{e(os.environ.get('DB_PASS',''))}');")
          print(f"define('HUBSPOT_TOKEN', '{e(os.environ.get('HUBSPOT_TOKEN',''))}');")
          print(f"define('ANTHROPIC_API_KEY', '{e(os.environ.get('ANTHROPIC_API_KEY',''))}');")
          print(f"define('RESEND_API_KEY', '{e(os.environ.get('RESEND_API_KEY',''))}');")
          PYEOF
          size=$(wc -c < crm-vanilla/api/config.local.php)
          resend_len=${#RESEND_API_KEY}
          echo "Generated config.local.php ($size bytes, RESEND_API_KEY length=$resend_len)"

      - name: Deploy crm-vanilla via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./crm-vanilla/
          local-dir: ./crm-vanilla/
          dry-run: ${{ github.event.inputs.dry-run == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log

      - name: Smoke test
        run: |
          echo "Testing CRM endpoints..."
          BASE="https://netwebmedia.com/companies/crm-vanilla"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          for path in "/" "/contacts.html" "/api/index.php?r=contacts" "/api/index.php?r=leads"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$path" -H "User-Agent: $UA")
            echo "  $path -> $STATUS"
          done
