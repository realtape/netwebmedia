<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>NetWebMedia — Launch Command Center</title>

  <!-- Production build: no Babel, no Tailwind CDN. Compiled assets are same-origin.
       Edit app.jsx / src/input.css then `npm run build` to regenerate app.js / app.css. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css" />

  <!-- React from unpkg (allowed by site CSP script-src; production builds use no eval) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-slate-100 text-navy">
  <div id="root" class="min-h-screen"></div>

  <!-- Precompiled app (JSX already transformed to React.createElement) -->
  <script src="app.js"></script>
</body>
</html>
