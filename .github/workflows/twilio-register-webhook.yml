name: Register Twilio Webhook (one-shot)

# Triggered manually. Registers the NWM CRM webhook URL on the Twilio
# phone number stored in TWILIO_FROM secret for both SMS and WhatsApp.
# Safe to re-run — Twilio updates are idempotent.

on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Register SMS webhook
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
        run: |
          WEBHOOK="https://netwebmedia.com/crm-vanilla/api/webhook_twilio.php"

          echo "Looking up phone number SID for $TWILIO_FROM ..."
          # List phone numbers, filter by phone number
          PHONE_SID=$(curl -s -u "$TWILIO_SID:$TWILIO_TOKEN" \
            "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/IncomingPhoneNumbers.json?PhoneNumber=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TWILIO_FROM'))")" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['incoming_phone_numbers'][0]['sid'] if d.get('incoming_phone_numbers') else '')")

          if [ -z "$PHONE_SID" ]; then
            echo "::warning::Phone number $TWILIO_FROM not found — trying WhatsApp sender path instead"
          else
            echo "Phone SID: $PHONE_SID"
            echo "Setting SMS inbound webhook..."
            curl -s -u "$TWILIO_SID:$TWILIO_TOKEN" \
              -X POST "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/IncomingPhoneNumbers/$PHONE_SID.json" \
              --data-urlencode "SmsUrl=$WEBHOOK" \
              --data-urlencode "SmsMethod=POST" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('SMS webhook set:', d.get('sms_url','?'))"
          fi

      - name: Register WhatsApp sender webhook
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
        run: |
          WEBHOOK="https://netwebmedia.com/crm-vanilla/api/webhook_twilio.php"

          echo "Listing WhatsApp senders..."
          # Try sandbox first (most common for dev/small accounts)
          RESULT=$(curl -s -u "$TWILIO_SID:$TWILIO_TOKEN" \
            "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/Messages/Sandbox.json" 2>/dev/null || echo "{}")

          # List messaging services to find WhatsApp-enabled one
          SERVICES=$(curl -s -u "$TWILIO_SID:$TWILIO_TOKEN" \
            "https://messaging.twilio.com/v1/Services" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(s['sid'], s['friendly_name']) for s in d.get('services',[])]" 2>/dev/null || true)

          if [ -n "$SERVICES" ]; then
            echo "Messaging services found:"
            echo "$SERVICES"
          fi

          # Update WhatsApp sandbox webhook if accessible
          curl -s -u "$TWILIO_SID:$TWILIO_TOKEN" \
            -X POST "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/SandboxParticipants.json" \
            --data-urlencode "StatusCallbackUrl=$WEBHOOK" 2>/dev/null || true

          echo "Done. Verify at: https://console.twilio.com/us1/develop/sms/try-it-out/whatsapp-learn"

      - name: Verify webhook is reachable
        run: |
          echo "Checking webhook URL is live..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "From=%2B14155238886&To=%2B15550000000&Body=test&MessageSid=SMtest123" \
            "https://netwebmedia.com/crm-vanilla/api/webhook_twilio.php")
          echo "Webhook HTTP status: $STATUS"
          # 200 = TwiML reply, 403 = signature mismatch (expected — no real sig), both mean it's live
          [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] && echo "Webhook is live!" || echo "::warning::Unexpected status $STATUS"
