<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>NetWebMedia profile avatar</title>
  <desc>Square brand avatar for social profiles. Navy #010F3B background, sky-blue #5DB4E5 + orange #FF671F lowercase wordmark. 1024x1024. 2026-05-12 refresh.</desc>
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF671F"/>
      <stop offset="100%" stop-color="#ff8c4a"/>
    </linearGradient>
  </defs>
  <!-- Navy background, full bleed -->
  <rect width="1024" height="1024" fill="#010F3B"/>
  <!-- Orange accent ring for brand pop, safe inside Instagram circular crop -->
  <circle cx="512" cy="512" r="448" fill="none" stroke="url(#orangeGradient)" stroke-width="10"/>
  <!-- Lowercase "nwm" wordmark — primary brand mark -->
  <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="460"
        letter-spacing="-24">
    <tspan fill="#5DB4E5">n</tspan><tspan fill="#FF671F">w</tspan><tspan fill="#5DB4E5">m</tspan>
  </text>
  <!-- Subtle "netwebmedia.com" wordmark at bottom safe-area -->
  <text x="512" y="870" text-anchor="middle"
        font-family="'Inter','Arial',sans-serif"
        font-weight="600" font-size="46" fill="#C8D4E6" letter-spacing="6">NETWEBMEDIA.COM</text>
</svg>
