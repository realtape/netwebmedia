      <stop offset="0%" stop-color="#021046"/>
      <stop offset="100%" stop-color="#010A29"/>
    </linearGradient>
    <radialGradient id="glow2" cx="85%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#FF671F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF671F" stop-opacity="0"/>
    </radialGradient>
