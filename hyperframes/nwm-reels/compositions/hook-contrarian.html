<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #010F3B; font-family: 'Poppins', sans-serif; }
      .clip { position: absolute; top: 0; left: 0; }
      .scene-bg { position: absolute; width: 1080px; height: 1920px; top: 0; left: 0; }

      /* Fix 1: PNG logo card */
      .nwm-logo { position: absolute; top: 36px; right: 40px; z-index: 200; opacity: 0.98; }
      .nwm-logo img { display: block; width: 200px; height: auto; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }

      /* Fix 3: B-roll layers */
      .broll { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; object-fit: cover; }
      .broll-tint { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px;
        background: linear-gradient(180deg, rgba(1,15,59,0.82) 0%, rgba(1,15,59,0.92) 100%); }

      /* Diagonal split background — on top of tint */
      #bg-split {
        width: 1080px; height: 1920px;
        background: linear-gradient(145deg, rgba(1,15,59,0.0) 55%, rgba(255,103,31,0.55) 55%);
        opacity: 0;
      }

      /* DEAD stamp — Fix 2: track-index=5, separate from ct-block (track-index=4) */
      #stamp {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) rotate(-12deg);
        border: 12px solid #FF671F;
        color: #FF671F;
        font-size: 120px;
        font-weight: 900;
        letter-spacing: 8px;
        padding: 10px 30px;
        opacity: 0;
        white-space: nowrap;
        z-index: 5;
      }

      /* Main text block — center, z-index:3 */
      #ct-block {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 900px;
        z-index: 3;
      }
      #ct-dead { color: #FF671F; font-size: 130px; font-weight: 900; line-height: 1; opacity: 0; text-transform: uppercase; }
      #ct-subject { color: #FFFFFF; font-size: 64px; font-weight: 900; line-height: 1.1; opacity: 0; text-transform: uppercase; margin-top: 10px; }
      #ct-bar { width: 0; height: 5px; background: #FF671F; border-radius: 3px; margin: 36px auto; opacity: 0; }
      #ct-pivot { color: rgba(255,255,255,0.7); font-size: 28px; font-weight: 500; opacity: 0; line-height: 1.4; }
    </style>
  </head>
  <body>
    <div id="root"
         data-composition-id="hook-contrarian"
         data-start="0" data-duration="5"
         data-width="1080" data-height="1920">

      <!-- Fix 3: B-roll video layer -->
      <video id="broll-ct-s1" class="broll clip" muted autoplay loop
             src="../assets/broll/mk-50197.mp4"
             data-start="0" data-duration="5" data-track-index="0"></video>
      <div class="broll-tint clip" data-start="0" data-duration="5" data-track-index="1"></div>

      <!-- diagonal split overlay on top of tint -->
      <div id="bg-split" class="clip scene-bg" data-start="0" data-duration="5" data-track-index="2"></div>

      <!-- ct-block at track-index 4, stamp at track-index 5 — Fix 2: sequential GSAP beats -->
      <div id="ct-block" class="clip" data-start="0" data-duration="5" data-track-index="4">
        <div id="ct-dead">SEO</div>
        <div id="ct-subject">IS DEAD.</div>
        <div id="ct-bar"></div>
        <div id="ct-pivot">Here's what replaced it.</div>
      </div>

      <div id="stamp" class="clip" data-start="0" data-duration="5" data-track-index="5">DEAD.</div>

      <!-- Fix 1: PNG logo card, track-index 10 -->
      <div class="nwm-logo clip" data-start="0" data-duration="5" data-track-index="10">
        <img src="../assets/nwm-logo.svg" alt="netwebmedia"/>
      </div>

    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* Fix 2: stamp animates IN, then fades OUT before text block animates in */
      tl.to("#bg-split",   { opacity: 1, duration: 0.4 }, 0)
        .to("#stamp",      { opacity: 1, duration: 0.3, scale: 1.08, ease: "power2.out" }, 0.3)
        .to("#stamp",      { scale: 1, duration: 0.2 }, 0.6)
        .to("#stamp",      { opacity: 0, duration: 0.3, ease: "power2.in" }, 1.0)
        .to("#ct-dead",    { opacity: 1, duration: 0.4, ease: "power3.out" }, 1.4)
        .to("#ct-subject", { opacity: 1, duration: 0.4 }, 1.7)
        .to("#ct-bar",     { opacity: 1, width: 90, duration: 0.4 }, 2.0)
        .to("#ct-pivot",   { opacity: 1, duration: 0.5 }, 2.3);

      window.__timelines["hook-contrarian"] = tl;
    </script>
  </body>
</html>
