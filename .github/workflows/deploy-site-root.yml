name: Deploy site root to netwebmedia.com

# Publishes the public website root (HTML, CSS, JS, PHP API, assets) to
# https://netwebmedia.com/ via FTPS.
#
# Why a separate workflow from deploy-companies.yml:
#   - deploy-companies.yml uses the `webmed6` FTP user, which is chrooted to
#     /public_html/companies/ on the cPanel box. It physically cannot write
#     site-root files.
#   - This workflow uses a DIFFERENT FTP user scoped to /public_html/ so it
#     can deploy index.html, nwm-crm.html, faq.html, css/, js/, api-php/, etc.
#
# Requires 3 repo secrets — one-time setup (Settings → Secrets and variables → Actions):
#   CPANEL_FTP_HOST            ftp.netwebmedia.com   (already set)
#   CPANEL_FTP_ROOT_USER       cPanel FTP account scoped to /public_html/  (must be created — see below)
#   CPANEL_FTP_ROOT_PASSWORD   matching password                             (must be created)
#
# Why a new user: the existing CPANEL_FTP_USER is chrooted to /public_html/companies/
# and can't write to the site root. Create a second FTP account in cPanel:
#   cPanel → FTP Accounts → Add FTP Account
#     Login:      deploy-root@netwebmedia.com
#     Directory:  /public_html            ← the important part
#     Quota:      Unlimited
#
# Optional — only used if api-php/** is in the changeset (config.local.php generation):
#   CRM_DB_PASSWORD, HUBSPOT_TOKEN, ANTHROPIC_API_KEY, RESEND_API_KEY,
#   MP_ACCESS_TOKEN, MP_PUBLIC_KEY, MP_WEBHOOK_SECRET, JWT_SECRET
#
# Optional — CRM maintenance-endpoint tokens (used by migrate, seed, dedupe,
# import_best, import_csv handlers in crm-vanilla/api/). If absent, the
# historic defaults from crm-vanilla/api/config.php are preserved:
#   MIGRATE_TOKEN, SEED_TOKEN, DEDUPE_TOKEN, IMPORT_BEST_TOKEN, IMPORT_CSV_TOKEN
#
# Server-side target: /public_html/  (public URL is site root)

on:
  push:
    branches: [main]
    paths:
      # Top-level HTML pages
      - '*.html'
      # Apache config (redirects, caching, security headers)
      - '.htaccess'
      # One-shot PHP maintenance scripts at repo root (explicit allowlist in staging step)
      - '_opcache_reset.php'
      - 'blog/**'
      - 'crm/**'
      - 'tutorials/**'
      - 'crm-demo/**'
      - 'cms-demo/**'
      - 'cms/**'
      # /app/* shell for coming-soon waitlist + shipped feature stubs
      - 'app/**'
      # Industry pages + subdomain landing pages (39 subdomains served from here)
      - 'industries/**'
      # Landing-page form handlers + shared thank-you pages
      - 'submit.php'
      - 'audit-submit.php'
      - 'audit-thanks.html'
      # List-Unsubscribe endpoint (RFC 8058 one-click for Gmail)
      - 'unsubscribe.php'
      # Per-prospect audit page (token URL from Chile cold-outreach emails)
      - 'audit.php'
      # Shared static assets
      - 'css/**'
      - 'js/**'
      - 'assets/**'
      - 'images/**'
      - 'fonts/**'
      - 'lp/**'
      - 'guides/**'
      - 'plans/**'
      # Mobile deep-linking (Apple Universal Links + Android App Links)
      - '.well-known/**'
      # SEO crawl directives — sitemap + robots
      # sitemap.xml: full inventory.
      # sitemap-priority.xml: top-value URLs (priority >= 0.85) for crawl-budget signal.
      # sitemap-index.xml: master index referencing both child sitemaps.
      - 'sitemap.xml'
      - 'sitemap-priority.xml'
      - 'sitemap-index.xml'
      - 'robots.txt'
      # Server-side API
      - 'api/**'
      - 'api-php/**'
      # CRM SPA (the FTP user in deploy-crm.yml is chrooted to /companies/
      # and can't write to /public_html/crm-vanilla/ where app.netwebmedia.com
      # serves from — main FTP user owns this path)
      - 'crm-vanilla/**'
      # Livery editor (iRacing paint tool)
      - 'livery-editor/**'
      # Rotation tracker (triggers deploy when admin tokens are rotated)
      - '.rotation/**'
      # Social channel hub (/social/index.html etc.)
      - 'social/**'
      # Superadmin panel (admin.netwebmedia.com)
      - 'superadmin/**'
      # Workflow itself
      - '.github/workflows/deploy-site-root.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log-only mode (no actual FTP writes)'
        type: boolean
        default: false

concurrency:
  group: deploy-site-root
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Preflight — verify required secrets
        id: preflight
        run: |
          if [ -z "${{ secrets.CPANEL_FTP_ROOT_USER }}" ] || [ -z "${{ secrets.CPANEL_FTP_ROOT_PASSWORD }}" ]; then
            echo "::warning::CPANEL_FTP_ROOT_USER / CPANEL_FTP_ROOT_PASSWORD not configured — skipping deploy."
            echo ""
            echo "One-time setup:"
            echo "  1. cPanel -> FTP Accounts -> Add FTP Account"
            echo "     Login:     deploy-root@netwebmedia.com"
            echo "     Directory: /public_html"
            echo "     Quota:     Unlimited"
            echo "  2. GitHub repo -> Settings -> Secrets and variables -> Actions"
            echo "     CPANEL_FTP_ROOT_USER      = deploy-root@netwebmedia.com"
            echo "     CPANEL_FTP_ROOT_PASSWORD  = <password from step 1>"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "Secrets present — proceeding to deploy."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage site-root files
        run: |
          mkdir -p _stage
          # Top-level HTML — copy all .html files at repo root
          for f in *.html robots.txt sitemap.xml sitemap-priority.xml sitemap-index.xml humans.txt; do
            [ -f "$f" ] && cp "$f" "_stage/$f" || true
          done
          # IndexNow ownership-verification key file (32-hex-char filename).
          # If present at repo root, ship it. Bing/Yandex/Seznam/Naver/Yep
          # fetch this URL to verify we control the domain before accepting pings.
          for f in *.txt; do
            if [[ "$f" =~ ^[a-f0-9]{32}\.txt$ ]] && [ -f "$f" ]; then
              cp "$f" "_stage/$f"
              echo "  + IndexNow key: $f"
            fi
          done
          # One-shot PHP maintenance scripts placed at repo root (self-deleting server-side).
          # Explicit allowlist — do NOT glob *.php at root unless you want to ship every PHP file.
          for f in _opcache_reset.php audit-submit.php submit.php unsubscribe.php audit.php; do
            [ -f "$f" ] && cp "$f" "_stage/$f" || true
          done
          # Apache config — ships as a dotfile so the FTP step doesn't filter it out
          [ -f .htaccess ] && cp .htaccess _stage/.htaccess || true
          # .well-known/ (security.txt, etc.) — RFC 8615 conventions
          [ -d .well-known ] && cp -r .well-known _stage/.well-known || true
          # Directories
          #
          # Intentionally NON-public (excluded from this loop on purpose):
          #   community-alert-app/  — separate Node.js app, not InMotion-deployable (has its own server.js)
          #   hyperframes/          — local video render workspace (~50GB of MP4/JPG artifacts; never ship)
          #   _deploy/              — generator scratch + playbooks (excluded via FTP exclude rules below)
          #   _backup/              — local backups
          #   mobile/               — Capacitor app, ships via Xcode/Android Studio not FTPS
          #   video-factory/        — Remotion renderer, runs separately on :3030
          #   backend/              — Django CRM, separate property
          # When adding a new top-level public dir, you must update BOTH the `on.push.paths` trigger
          # AND this staging loop (forgetting the loop = silent 404 on the new dir).
          for d in css js assets images fonts crm api api-php tutorials crm-demo cms-demo crm-vanilla cms blog lp guides plans industries app livery-editor social superadmin; do
            [ -d "$d" ] && cp -r "$d" "_stage/$d" || true
          done
          # Drop dev/test artifacts that shouldn't ship
          find _stage -name '.DS_Store' -delete
          find _stage -name 'Thumbs.db' -delete
          find _stage -name '*.pyc' -delete
          find _stage -type d -name '__pycache__' -exec rm -rf {} + || true
          find _stage -type d -name '.git' -exec rm -rf {} + || true
          echo "── Stage contents ──"
          du -sh _stage
          echo "Top-level files in stage:"
          ls -1 _stage

      - name: Generate api-php/config.local.php from secrets
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        run: |
          # Only generate if api-php was staged (i.e., api-php/** was part of the trigger)
          if [ -d "_stage/api-php" ]; then
            cat > _stage/api-php/config.local.php <<'PHP'
          <?php
          /* Generated by GitHub Actions — DO NOT commit. */
          return [
            'db_host'               => 'localhost',
            'db_name'               => 'webmed6_nwm',
            'db_user'               => 'webmed6_nwm',
            'db_pass'               => getenv('DB_PASS_PLACEHOLDER'),
            'jwt_secret'            => getenv('JWT_SECRET_PLACEHOLDER'),
            'hubspot_token'         => getenv('HUBSPOT_TOKEN_PLACEHOLDER'),
            'anthropic_api_key'     => getenv('ANTHROPIC_API_KEY_PLACEHOLDER'),
            'resend_api_key'        => getenv('RESEND_API_KEY_PLACEHOLDER'),
            'aws_ses_key'           => getenv('AWS_SES_KEY_PLACEHOLDER'),
            'aws_ses_secret'        => getenv('AWS_SES_SECRET_PLACEHOLDER'),
            'aws_ses_region'        => getenv('AWS_SES_REGION_PLACEHOLDER'),
            'mp_access_token'       => getenv('MP_ACCESS_TOKEN_PLACEHOLDER'),
            'mp_public_key'         => getenv('MP_PUBLIC_KEY_PLACEHOLDER'),
            'mp_webhook_secret'     => getenv('MP_WEBHOOK_SECRET_PLACEHOLDER'),
            'twilio_sid'            => getenv('TWILIO_SID_PLACEHOLDER'),
            'twilio_token'          => getenv('TWILIO_TOKEN_PLACEHOLDER'),
            'twilio_from'           => getenv('TWILIO_FROM_PLACEHOLDER'),
            'whatsapp_verify_token' => getenv('WA_VERIFY_PLACEHOLDER'),
            'whatsapp_meta_token'   => getenv('WA_META_TOKEN_PLACEHOLDER'),
            'whatsapp_phone_id'     => getenv('WA_PHONE_ID_PLACEHOLDER'),
            'whatsapp_meta_app_secret' => getenv('WA_META_APP_SECRET_PLACEHOLDER'),
          ];
          PHP
            # Replace getenv placeholders with real secret values at deploy time
            python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("_stage/api-php/config.local.php")
          s = p.read_text()
          mapping = {
            "DB_PASS_PLACEHOLDER":           os.environ.get("SECRET_DB_PASS", ""),
            "JWT_SECRET_PLACEHOLDER":        os.environ.get("SECRET_JWT_SECRET", ""),
            "HUBSPOT_TOKEN_PLACEHOLDER":     os.environ.get("SECRET_HUBSPOT_TOKEN", ""),
            "ANTHROPIC_API_KEY_PLACEHOLDER": os.environ.get("SECRET_ANTHROPIC_API_KEY", ""),
            "RESEND_API_KEY_PLACEHOLDER":    os.environ.get("SECRET_RESEND_API_KEY", ""),
            "AWS_SES_KEY_PLACEHOLDER":       os.environ.get("SECRET_AWS_SES_KEY", ""),
            "AWS_SES_SECRET_PLACEHOLDER":    os.environ.get("SECRET_AWS_SES_SECRET", ""),
            "AWS_SES_REGION_PLACEHOLDER":    os.environ.get("SECRET_AWS_SES_REGION", "us-east-1"),
            "MP_ACCESS_TOKEN_PLACEHOLDER":   os.environ.get("SECRET_MP_ACCESS_TOKEN", ""),
            "MP_PUBLIC_KEY_PLACEHOLDER":     os.environ.get("SECRET_MP_PUBLIC_KEY", ""),
            "MP_WEBHOOK_SECRET_PLACEHOLDER": os.environ.get("SECRET_MP_WEBHOOK_SECRET", ""),
            "TWILIO_SID_PLACEHOLDER":        os.environ.get("SECRET_TWILIO_SID", ""),
            "TWILIO_TOKEN_PLACEHOLDER":      os.environ.get("SECRET_TWILIO_TOKEN", ""),
            "TWILIO_FROM_PLACEHOLDER":       os.environ.get("SECRET_TWILIO_FROM", ""),
            "WA_VERIFY_PLACEHOLDER":         os.environ.get("SECRET_WA_VERIFY_TOKEN", "nwm-whatsapp-verify"),
            "WA_META_TOKEN_PLACEHOLDER":     os.environ.get("SECRET_WA_META_TOKEN", ""),
            "WA_PHONE_ID_PLACEHOLDER":       os.environ.get("SECRET_WA_PHONE_ID", ""),
            "WA_META_APP_SECRET_PLACEHOLDER": os.environ.get("SECRET_WA_META_APP_SECRET", ""),
          }
          for k, v in mapping.items():
            s = s.replace(f'getenv(\'{k}\')', repr(v))
          p.write_text(s)
          print("config.local.php materialized")
          PY
            echo "api-php/config.local.php generated (not committed)"
          else
            echo "api-php not in stage — skipping config.local.php generation"
          fi

          # Also generate crm-vanilla/api/config.local.php — the CRM uses
          # define() constants (DB_PASS, RESEND_API_KEY, …), not a config()
          # array. The deploy-crm.yml workflow generates this same file but
          # uploads via a chrooted FTP user that lands in /companies/, NOT
          # /crm-vanilla/. Re-generating here puts it on the correct path
          # via the root FTP user. Without this every CRM API handler
          # returns 500 (DB connection fails because DB_PASS is undefined).
          if [ -d "_stage/crm-vanilla/api" ]; then
            python3 - <<'PYEOF' > "_stage/crm-vanilla/api/config.local.php"
          import os
          def e(v: str) -> str: return (v or '').replace("\\", "\\\\").replace("'", "\\'")
          print("<?php")
          print("// Auto-generated during deploy. DO NOT EDIT.")
          print(f"define('DB_PASS', '{e(os.environ.get('SECRET_DB_PASS',''))}');")
          print(f"define('HUBSPOT_TOKEN', '{e(os.environ.get('SECRET_HUBSPOT_TOKEN',''))}');")
          print(f"define('ANTHROPIC_API_KEY', '{e(os.environ.get('SECRET_ANTHROPIC_API_KEY',''))}');")
          print(f"define('RESEND_API_KEY', '{e(os.environ.get('SECRET_RESEND_API_KEY',''))}');")
          print(f"define('AWS_SES_KEY', '{e(os.environ.get('SECRET_AWS_SES_KEY',''))}');")
          print(f"define('AWS_SES_SECRET', '{e(os.environ.get('SECRET_AWS_SES_SECRET',''))}');")
          print(f"define('AWS_SES_REGION', '{e(os.environ.get('SECRET_AWS_SES_REGION','us-east-1'))}');")
          print(f"define('TWILIO_ACCOUNT_SID', '{e(os.environ.get('SECRET_TWILIO_SID',''))}');")
          print(f"define('TWILIO_AUTH_TOKEN', '{e(os.environ.get('SECRET_TWILIO_TOKEN',''))}');")
          print(f"define('TWILIO_FROM_SMS', '{e(os.environ.get('SECRET_TWILIO_FROM',''))}');")
          print(f"define('TWILIO_FROM_WHATSAPP', '{e(os.environ.get('SECRET_TWILIO_FROM',''))}');")
          print(f"define('OPERATOR_WHATSAPP_NUMBER', '{e(os.environ.get('SECRET_OPERATOR_WHATSAPP_NUMBER',''))}');")
          # 'auto' = SES first, then Resend, then SMTP, then phpmail.
          # Caught during pre-launch smoke testing: phpmail silently dropped
          # workflow emails to Gmail (mail() returned true but Exim never
          # delivered). The CRM-vanilla email_sender now has a fallback chain
          # that tries reliable API providers first.
          # Override via SECRET_MAIL_PROVIDER ('phpmail' / 'smtp' / 'resend' / 'ses').
          # When Resend quota is exhausted and SMTP creds are stale, set the
          # secret to 'phpmail' as a temporary unblocker.
          print(f"define('MAIL_PROVIDER', '{e(os.environ.get('SECRET_MAIL_PROVIDER','auto'))}');")
          print(f"define('SMTP_HOST', 'mail.netwebmedia.com');")
          print(f"define('SMTP_PORT', 465);")
          print(f"define('SMTP_ENCRYPTION', 'ssl');")
          print(f"define('SMTP_USER', 'newsletter@netwebmedia.com');")
          print(f"define('SMTP_PASS', '{e(os.environ.get('SECRET_SMTP_PASS','').strip())}');")
          # Maintenance-endpoint tokens. Fallbacks match the historic defaults in
          # crm-vanilla/api/config.php so a missing secret = no behavior change.
          # Rotate by setting the matching GitHub Actions secret + re-deploying.
          print(f"define('MIGRATE_TOKEN', '{e(os.environ.get('SECRET_MIGRATE_TOKEN') or 'NWM_MIGRATE_2026')}');")
          print(f"define('SEED_TOKEN', '{e(os.environ.get('SECRET_SEED_TOKEN') or 'NWM_SEED_2026')}');")
          print(f"define('DEDUPE_TOKEN', '{e(os.environ.get('SECRET_DEDUPE_TOKEN') or 'NWM_DEDUPE_2026')}');")
          print(f"define('IMPORT_BEST_TOKEN', '{e(os.environ.get('SECRET_IMPORT_BEST_TOKEN') or 'NWM_IMPORT_BEST_2026')}');")
          print(f"define('IMPORT_CSV_TOKEN', '{e(os.environ.get('SECRET_IMPORT_CSV_TOKEN') or 'NWM_IMPORT_CHILE_2026')}');")
          # Facebook Page publishing — long-lived Page access token + numeric Page ID.
          # Both must come from Meta Business Manager / Graph API Explorer (no defaults).
          # Empty = fb_publish handler returns 503 on schedule action.
          print(f"define('FB_PAGE_ID', '{e(os.environ.get('SECRET_FB_PAGE_ID',''))}');")
          print(f"define('FB_PAGE_TOKEN', '{e(os.environ.get('SECRET_FB_PAGE_TOKEN',''))}');")
          # Instagram Graph publishing — Business Account ID + long-lived token w/ instagram_content_publish.
          # Requires Meta App Review (7–21 days). Empty = ig_publish handler returns 503.
          print(f"define('IG_BUSINESS_ACCOUNT_ID', '{e(os.environ.get('SECRET_IG_BUSINESS_ACCOUNT_ID',''))}');")
          print(f"define('IG_GRAPH_TOKEN', '{e(os.environ.get('SECRET_IG_GRAPH_TOKEN',''))}');")
          print(f"define('IG_IMAGE_BASE_URL', '{e(os.environ.get('SECRET_IG_IMAGE_BASE_URL') or 'https://netwebmedia.com')}');")
          # TikTok Content Posting API — long-lived access token + client key.
          # Requires TikTok Developer Portal approval (2–4 weeks). Empty = tt_publish handler returns 503.
          print(f"define('TT_ACCESS_TOKEN', '{e(os.environ.get('SECRET_TT_ACCESS_TOKEN',''))}');")
          print(f"define('TT_CLIENT_KEY', '{e(os.environ.get('SECRET_TT_CLIENT_KEY',''))}');")
          print(f"define('TT_REEL_BASE_URL', '{e(os.environ.get('SECRET_TT_REEL_BASE_URL') or 'https://netwebmedia.com')}');")
          PYEOF
            echo "crm-vanilla/api/config.local.php generated"
          else
            echo "crm-vanilla not in stage — skipping CRM config.local.php"
          fi

          # Generate js/pixel-init.js — frontend-side secret injection for Meta Pixel ID.
          # This file sets window.NWM_META_PIXEL_ID before any other script runs.
          # Gated initialization in HTML files checks if the ID is non-empty before fbq('init').
          if [ -d "_stage/js" ]; then
            python3 - <<'PYEOF' > "_stage/js/pixel-init.js"
          import os
          def e(v: str) -> str: return (v or '').replace("\\", "\\\\").replace('"', '\\"')
          pixel_id = (os.environ.get('SECRET_META_PIXEL_ID') or '').strip()
          print("// Auto-generated during deploy. DO NOT EDIT.")
          print(f"window.NWM_META_PIXEL_ID = '{e(pixel_id)}';")
          PYEOF
            echo "js/pixel-init.js generated (Meta Pixel ID injected)"
          else
            echo "js/ not in stage — creating it"
            mkdir -p "_stage/js"
            python3 - <<'PYEOF' > "_stage/js/pixel-init.js"
          import os
          def e(v: str) -> str: return (v or '').replace("\\", "\\\\").replace('"', '\\"')
          pixel_id = (os.environ.get('SECRET_META_PIXEL_ID') or '').strip()
          print("// Auto-generated during deploy. DO NOT EDIT.")
          print(f"window.NWM_META_PIXEL_ID = '{e(pixel_id)}';")
          PYEOF
            echo "js/pixel-init.js generated (Meta Pixel ID injected)"
          fi
        env:
          SECRET_DB_PASS:           ${{ secrets.CRM_DB_PASSWORD }}
          SECRET_JWT_SECRET:        ${{ secrets.JWT_SECRET }}
          SECRET_HUBSPOT_TOKEN:     ${{ secrets.HUBSPOT_TOKEN }}
          SECRET_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          SECRET_AWS_SES_KEY:       ${{ secrets.AWS_SES_KEY }}
          SECRET_AWS_SES_SECRET:    ${{ secrets.AWS_SES_SECRET }}
          SECRET_AWS_SES_REGION:    ${{ secrets.AWS_SES_REGION }}
          SECRET_MP_ACCESS_TOKEN:   ${{ secrets.MP_ACCESS_TOKEN }}
          SECRET_MP_PUBLIC_KEY:     ${{ secrets.MP_PUBLIC_KEY }}
          SECRET_MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          SECRET_TWILIO_SID:        ${{ secrets.TWILIO_SID }}
          SECRET_TWILIO_TOKEN:      ${{ secrets.TWILIO_TOKEN }}
          SECRET_TWILIO_FROM:       ${{ secrets.TWILIO_FROM }}
          SECRET_OPERATOR_WHATSAPP_NUMBER: ${{ secrets.OPERATOR_WHATSAPP_NUMBER }}
          SECRET_WA_VERIFY_TOKEN:   ${{ secrets.WA_VERIFY_TOKEN }}
          SECRET_WA_META_TOKEN:     ${{ secrets.WA_META_TOKEN }}
          SECRET_WA_PHONE_ID:       ${{ secrets.WA_PHONE_ID }}
          SECRET_WA_META_APP_SECRET: ${{ secrets.WA_META_APP_SECRET }}
          SECRET_SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          SECRET_MAIL_PROVIDER:     ${{ secrets.MAIL_PROVIDER }}
          # Maintenance-endpoint tokens (optional secrets — missing = production defaults preserved)
          SECRET_MIGRATE_TOKEN:     ${{ secrets.MIGRATE_TOKEN }}
          SECRET_SEED_TOKEN:        ${{ secrets.SEED_TOKEN }}
          SECRET_DEDUPE_TOKEN:      ${{ secrets.DEDUPE_TOKEN }}
          SECRET_IMPORT_BEST_TOKEN: ${{ secrets.IMPORT_BEST_TOKEN }}
          SECRET_IMPORT_CSV_TOKEN:  ${{ secrets.IMPORT_CSV_TOKEN }}
          SECRET_META_PIXEL_ID:     ${{ secrets.META_PIXEL_ID }}
          # Facebook Page publishing (fb_publish handler)
          SECRET_FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          SECRET_FB_PAGE_TOKEN:     ${{ secrets.FB_PAGE_TOKEN }}
          # Instagram Graph publishing (ig_publish handler) — pending Meta App Review
          SECRET_IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          SECRET_IG_GRAPH_TOKEN:        ${{ secrets.IG_GRAPH_TOKEN }}
          SECRET_IG_IMAGE_BASE_URL:     ${{ secrets.IG_IMAGE_BASE_URL }}
          # TikTok Content Posting API (tt_publish handler) — pending TikTok Developer Portal approval
          SECRET_TT_ACCESS_TOKEN:   ${{ secrets.TT_ACCESS_TOKEN }}
          SECRET_TT_CLIENT_KEY:     ${{ secrets.TT_CLIENT_KEY }}
          SECRET_TT_REEL_BASE_URL:  ${{ secrets.TT_REEL_BASE_URL }}

      - name: Server-side cleanup of decommissioned files
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        timeout-minutes: 2
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_ROOT_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_ROOT_PASSWORD }}
        run: |
          # FTPS deploy is non-destructive — files removed from the repo are NOT
          # auto-removed from the server. This step uses curl's --quote (DELE) to
          # delete decommissioned files server-side. Idempotent: missing files OK.
          # curl is preinstalled on ubuntu-latest; no apt-get install hang risk.
          set +e
          DELETIONS=(
            "_us_log.php"
            "_us_trigger.php"
            "_us_reset_failed.php"
            "_fixcmoprices.php"
          )
          for f in "${DELETIONS[@]}"; do
            # Use ftp:// + --ftp-ssl for EXPLICIT FTPS on port 21 (FTPES).
            # The ftps:// URL scheme would default to implicit FTPS on port 990,
            # which most cPanel hosts (including InMotion) don't expose externally.
            # 550 = file not found (already gone — fine). Other codes are warnings.
            code=$(curl --silent --show-error \
                        --user "$FTP_USER:$FTP_PASS" \
                        --ftp-ssl --ftp-pasv \
                        --connect-timeout 10 --max-time 25 \
                        --insecure \
                        --output /dev/null \
                        --write-out '%{response_code}' \
                        --quote "DELE $f" \
                        "ftp://$FTP_HOST/" 2>&1 || true)
            echo "  $f -> $code"
          done
          echo "Server-side cleanup complete."

      # InMotion FTPS occasionally drops the connection mid-transfer
      # ("Server sent FIN packet unexpectedly"). Retry up to 3 attempts.
      # Each attempt runs FTP-Deploy-Action's incremental sync (hash-based),
      # so retries only re-upload what's still missing — they don't redo work.
      # Priority upload of the auth-critical CRM files BEFORE the incremental
      # sync. FTP-Deploy-Action's server-side sync-state once recorded these as
      # uploaded when the bytes never landed (silent FTPS drop), so the
      # incremental sync skipped them for 3+ days — production ran pre-2026-05-18
      # crm-vanilla auth code and every deploy failed at the migrate step. The
      # comment-only "deploy-nonce" hash-busts (commits 0a70c2966 / 678fdb207)
      # did NOT fix it: the action re-recorded the file as synced without the
      # bytes landing. This force-pushes the two files directly via the proven
      # curl --ftp-ssl pattern (same as the cleanup step) so production is
      # correct within seconds, independent of the sync-state. The state-name
      # bump below makes the underlying drift self-heal permanently — once one
      # full re-sync has run green, this step can be deleted.
      - name: Priority upload — corrected CRM auth files
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        timeout-minutes: 2
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_ROOT_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_ROOT_PASSWORD }}
        run: |
          set +e
          # Explicit FTPS on port 21 (FTPES) — ftps:// would default to
          # implicit 990 which InMotion doesn't expose. Mirrors the cleanup step.
          UPLOADS=(
            "_stage/crm-vanilla/api/index.php|crm-vanilla/api/index.php"
            "_stage/crm-vanilla/api/lib/guard.php|crm-vanilla/api/lib/guard.php"
          )
          for pair in "${UPLOADS[@]}"; do
            src="${pair%%|*}"
            dst="${pair##*|}"
            if [ ! -f "$src" ]; then
              echo "  MISSING in stage: $src — skipping"
              continue
            fi
            code=$(curl --silent --show-error \
                        --user "$FTP_USER:$FTP_PASS" \
                        --ftp-ssl --ftp-pasv \
                        --connect-timeout 10 --max-time 30 \
                        --insecure \
                        --output /dev/null \
                        --write-out '%{response_code}' \
                        --upload-file "$src" \
                        "ftp://$FTP_HOST/$dst" 2>&1)
            echo "  $src -> /$dst  ($code)"
          done
          echo "Priority CRM auth-file upload complete."

      - name: Deploy via FTPS (attempt 1)
        id: deploy1
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_ROOT_USER }}
          password: ${{ secrets.CPANEL_FTP_ROOT_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./_stage/
          server-dir: ./
          dangerous-clean-slate: false
          # Bumped from .ftp-deploy-sync-state.json (2026-05-19): the old
          # server-side state was poisoned — it recorded crm-vanilla/api/
          # files as synced when the bytes never landed, so the incremental
          # sync skipped the 2026-05-18 auth fix for 3+ days. A fresh state
          # name forces one authoritative full re-push from the repo (source
          # of truth) and self-heals all latent drift. dangerous-clean-slate
          # stays false so server-only dirs (storage/, ratelimit/,
          # config.local.php, IndexNow key) are untouched.
          state-name: .ftp-deploy-sync-state-v2.json
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/Thumbs.db
            **/*.py
            **/__pycache__/**
            **/node_modules/**
            **/_deploy/**
            **/companies/**

      - name: Deploy via FTPS (attempt 2 — retry on transient FTP error)
        id: deploy2
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true && steps.deploy1.outcome == 'failure' }}
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_ROOT_USER }}
          password: ${{ secrets.CPANEL_FTP_ROOT_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./_stage/
          server-dir: ./
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state-v2.json
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/Thumbs.db
            **/*.py
            **/__pycache__/**
            **/node_modules/**
            **/_deploy/**
            **/companies/**

      - name: Deploy via FTPS (attempt 3 — final, fails workflow on error)
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_ROOT_USER }}
          password: ${{ secrets.CPANEL_FTP_ROOT_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./_stage/
          server-dir: ./
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/Thumbs.db
            **/*.py
            **/__pycache__/**
            **/node_modules/**
            **/_deploy/**
            **/companies/**

      - name: Run CRM DB migrations
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        env:
          # Must match what gets written to crm-vanilla/api/config.local.php above.
          MIGRATE_TOKEN: ${{ secrets.MIGRATE_TOKEN }}
        run: |
          # Auto-discovers every crm-vanilla/api/schema_*.sql file.
          # Drop a new schema_xxx.sql → it runs automatically on next deploy.
          # All migrations must be idempotent (migrate.php tolerates "duplicate column" errors).
          # Fallback to the historic default keeps CI working when the secret is unset.
          token="${MIGRATE_TOKEN:-NWM_MIGRATE_2026}"
          shopt -s nullglob
          schemas=( _stage/crm-vanilla/api/schema_*.sql )
          if [ ${#schemas[@]} -eq 0 ]; then
            echo "No schema_*.sql files found — skipping migrations"
          else
            for sql_file in "${schemas[@]}"; do
              schema=$(basename "$sql_file" .sql | sed 's/^schema_//')
              echo "Running migration: $schema"
              # Browser-style headers — mod_security on InMotion 406-blocks bare curl UAs.
              resp=$(curl -sS --max-time 60 \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
                -H "Accept: application/json,text/plain,*/*" \
                -H "Accept-Language: en-US,en;q=0.9" \
                -H "Origin: https://netwebmedia.com" \
                -H "Referer: https://netwebmedia.com/crm-vanilla/" \
                -H "Content-Type: application/json" \
                -X POST -d '{}' \
                "https://netwebmedia.com/crm-vanilla/api/?r=migrate&token=${token}&schema=$schema")
              echo "  $schema → $resp"
              echo "$resp" | grep -q '"ran"' || { echo "Migration $schema did not return expected JSON"; exit 1; }
            done
          fi
          echo "Migrations complete"

      - name: Seed CRM contacts (Chile + USA)
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        env:
          IMPORT_BEST_TOKEN: ${{ secrets.IMPORT_BEST_TOKEN }}
        run: |
          # Idempotent — import_best uses INSERT IGNORE on email so re-runs are safe.
          # Skipped gracefully if CSV not found on server or token unset.
          token="${IMPORT_BEST_TOKEN:-NWM_IMPORT_BEST_2026}"
          hdrs=(
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
            -H "Accept: application/json,text/plain,*/*"
            -H "Origin: https://netwebmedia.com"
            -H "Referer: https://netwebmedia.com/crm-vanilla/"
          )
          for country in chile usa; do
            echo "Importing $country contacts..."
            resp=$(curl -sS --max-time 300 "${hdrs[@]}" \
              "https://netwebmedia.com/crm-vanilla/api/?r=import_best&token=${token}&country=${country}" || true)
            echo "  $country → $resp"
          done
          echo "Contact seed step complete"

      - name: Smoke test live URLs
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        run: |
          set -e
          URLS=(
            "https://netwebmedia.com/"
            "https://netwebmedia.com/nwm-crm.html"
            "https://netwebmedia.com/nwm-cms.html"
            "https://netwebmedia.com/faq.html"
            "https://netwebmedia.com/tutorials.html"
            "https://netwebmedia.com/tutorials/nwm-crm.html"
            "https://netwebmedia.com/api/"
            "https://netwebmedia.com/industries/"
            "https://netwebmedia.com/industries/hospitality/"
            "https://netwebmedia.com/industries/hospitality/hotels/"
            "https://netwebmedia.com/industries/hospitality/hotels/thanks.html"
            "https://netwebmedia.com/industries/smb/"
            "https://netwebmedia.com/industries/legal-services/"
            "https://netwebmedia.com/industries/local-services/"
            "https://netwebmedia.com/industries/automotive/"
            "https://netwebmedia.com/industries/education/"
            "https://netwebmedia.com/industries/events-weddings/"
            "https://netwebmedia.com/industries/finance/"
            "https://netwebmedia.com/industries/wine-agriculture/"
            "https://netwebmedia.com/audit-thanks.html"
            "https://netwebmedia.com/livery-editor/"
          )
          for u in "${URLS[@]}"; do
            # -L follows redirects (cPanel often 301s .html to trailing-slash)
            code=$(curl -sSL -o /dev/null -w "%{http_code}" -A "Mozilla/5.0 (gh-actions smoke test)" --max-time 20 "$u")
            echo "  $code  $u"
            [ "$code" = "200" ] || { echo "non-200 for $u"; exit 1; }
          done
          echo "All smoke-test URLs 200 OK"

      - name: Smoke test submit.php (honeypot path)
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        run: |
          # Posts a tripped honeypot to /submit.php — submit.php's first guard
          # is `if (!empty($_POST['website_url']))` which immediately returns 200.
          # This catches PHP parse-error regressions BEFORE any real lead submits
          # one (the heredoc bug 2026-04-22 would have been caught here — submit.php
          # would have 500'd because the file failed to parse, never reaching the
          # honeypot guard). Also exercises audit-submit.php for the same reason.
          for endpoint in submit.php audit-submit.php; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -A "Mozilla/5.0 (gh-actions smoke test)" \
              --max-time 15 \
              -X POST \
              -H "Referer: https://netwebmedia.com/" \
              -d "website_url=spam" \
              "https://netwebmedia.com/$endpoint")
            echo "  $code  POST /$endpoint (honeypot)"
            [ "$code" = "200" ] || { echo "$endpoint did not return 200 — likely parse error"; exit 1; }
          done
          echo "submit.php + audit-submit.php parse-clean"

      - name: Verify coupon endpoint
        if: ${{ steps.preflight.outputs.ready == 'true' && inputs.dry_run != true }}
        run: |
          # Post-deploy smoke test: /api/ root returns the canonical router info
          # (Carlos26 coupon validation retired 2026-04-21 — promo is dead.)
          # -A needed — ModSecurity on InMotion 406s bare curl user-agents
          resp=$(curl -sS --max-time 15 \
            -A "Mozilla/5.0 (gh-actions smoke test)" \
            "https://netwebmedia.com/api/")
          echo "API root response: $resp"
          echo "$resp" | grep -q '"name":"NetWebMedia API"' && echo "API bridge live" || \
            { echo "API bridge smoke test failed — check /api/ routing"; exit 1; }
