<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campaigns - NetWeb CMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../crm/css/app.css">
  <link rel="stylesheet" href="css/cms.css">
  <style>
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
    .stat{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px}
    .stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em}
    .stat .val{font-size:26px;font-weight:700;margin-top:4px}
    .mod-table{width:100%;border-collapse:collapse}
    .mod-table th,.mod-table td{padding:10px 12px;border-bottom:1px solid #eee;text-align:left;font-size:14px}
    .mod-table th{background:#f7f7fb;font-size:12px;text-transform:uppercase;color:#666}
    .badge{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600}
    .b-draft{background:#eef;color:#447}
    .b-sending{background:#fef5d3;color:#8a6d00}
    .b-completed{background:#dcf7e3;color:#0d7028}
    .b-failed{background:#fdd;color:#a00}
    .nwm-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
    .nwm-modal{background:#fff;color:#111;border-radius:12px;width:min(880px,96vw);margin:auto}
    .nwm-modal-head{display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eee}
    .nwm-modal-head h3{margin:0}
    .nwm-modal-close{background:none;border:none;font-size:28px;cursor:pointer}
    .nwm-modal-body{padding:20px}
    .nwm-modal-foot{margin-top:16px;display:flex;gap:8px;justify-content:flex-end}
    .lbl{display:block;margin-bottom:14px;font-size:13px;color:#444}
    .inp{display:block;width:100%;padding:10px 12px;border:1px solid #d5d9e2;border-radius:8px;font-size:14px;margin-top:4px;font-family:inherit}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .btn-sm{padding:4px 10px;font-size:12px}
    .btn-danger{background:#e74c3c;color:#fff}
    .preview-frame{width:100%;height:520px;border:1px solid #ddd;border-radius:8px;background:#fff}
    .aud-box{background:#f7f7fb;padding:12px;border-radius:8px;margin-top:8px;font-size:13px;color:#444}
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body">
        <div id="stats" class="grid"></div>
        <div id="list"></div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/cms.js"></script>
  <script>
  (function() {
    'use strict';
    var TOK = NWMApi.token();
    var H = { 'Content-Type': 'application/json', 'X-Auth-Token': TOK };

    function api(path, opts) {
      opts = opts || {};
      opts.headers = Object.assign({}, H, opts.headers || {});
      if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
      return fetch('/api' + path, opts).then(function(r) { return r.json(); });
    }

    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }

    if (window.CMS_APP) CMS_APP.buildHeader('Campaigns',
      '<button class="btn btn-primary" id="newCamp">+ New Campaign</button>',
      'Send personalized batch email from newsletter@netwebmedia.com');

    var state = { items: [], regions: [], contacts_total: 0 };

    function stats() {
      var t = state.items.length;
      var sending = state.items.filter(function(c){return c.status==='sending'}).length;
      var sent = state.items.reduce(function(s,c){return s+(+c.sent||0)},0);
      var opened = state.items.reduce(function(s,c){return s+(+c.opened||0)},0);
      var clicked = state.items.reduce(function(s,c){return s+(+c.clicked||0)},0);
      document.getElementById('stats').innerHTML =
        ['<div class="stat"><div class="lbl">Campaigns</div><div class="val">'+t+'</div></div>',
         '<div class="stat"><div class="lbl">Sending now</div><div class="val">'+sending+'</div></div>',
         '<div class="stat"><div class="lbl">Emails sent</div><div class="val">'+sent.toLocaleString()+'</div></div>',
         '<div class="stat"><div class="lbl">Opens</div><div class="val">'+opened.toLocaleString()+'</div></div>',
         '<div class="stat"><div class="lbl">Clicks</div><div class="val">'+clicked.toLocaleString()+'</div></div>',
         '<div class="stat"><div class="lbl">Contacts available</div><div class="val">'+state.contacts_total+'</div></div>'].join('');
    }

    function render() {
      stats();
      var rows = state.items.map(function(c){
        var aud = c.audience || {};
        var audLbl = Object.keys(aud).filter(function(k){return aud[k]}).map(function(k){return k+':'+aud[k]}).join(', ') || 'all contacts';
        var openRate = c.sent ? Math.round(100*c.opened/c.sent)+'%' : '—';
        var clickRate = c.sent ? Math.round(100*c.clicked/c.sent)+'%' : '—';
        return '<tr>'+
          '<td><strong>'+esc(c.name)+'</strong><div style="font-size:11px;color:#888">'+esc(c.subject)+'</div></td>'+
          '<td style="font-size:12px;color:#666">'+esc(audLbl)+'</td>'+
          '<td><span class="badge b-'+esc(c.status)+'">'+esc(c.status)+'</span></td>'+
          '<td>'+(c.sent||0)+' / '+(c.total_recipients||0)+'</td>'+
          '<td>'+openRate+' open</td>'+
          '<td>'+clickRate+' click</td>'+
          '<td style="white-space:nowrap;">'+
            '<button class="btn btn-sm" data-act="edit"  data-id="'+c.id+'">Edit</button> '+
            '<button class="btn btn-sm" data-act="preview" data-id="'+c.id+'">Preview</button> '+
            (c.status==='draft' ? '<button class="btn btn-sm btn-primary" data-act="send" data-id="'+c.id+'">Send</button> ' : '')+
            (c.status==='sending' ? '<button class="btn btn-sm" data-act="tick" data-id="'+c.id+'">Tick</button> ' : '')+
            '<button class="btn btn-sm btn-danger" data-act="del" data-id="'+c.id+'">×</button>'+
          '</td>'+
          '</tr>';
      }).join('');
      document.getElementById('list').innerHTML =
        '<table class="mod-table"><thead><tr><th>Name</th><th>Audience</th><th>Status</th><th>Sent</th><th>Open</th><th>Click</th><th></th></tr></thead><tbody>'+
        (rows || '<tr><td colspan="7" style="text-align:center;padding:30px;color:#888;">No campaigns yet. Click "New Campaign".</td></tr>')+
        '</tbody></table>';
    }

    function defaultHtml() {
      return [
        '<p>Hola {{name}},</p>',
        '<p>Soy Carlos de <strong>NetWebMedia</strong>. Trabajamos con negocios de {{niche}} en {{city}} para crecer con IA — agentes 24/7, sitios web que convierten, y automatización de leads.</p>',
        '<p>Revisamos su presencia digital y detectamos oportunidades para <strong>{{company}}</strong> en:</p>',
        '<ul><li>{{pain_points}}</li></ul>',
        '<p>Un plan rápido puede cambiar su captación en 30-60 días:</p>',
        '<p><a href="https://netwebmedia.com/pricing.html" style="background:#6c5ce7;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;display:inline-block;font-weight:600;">Ver planes (desde $47.000 CLP/mes)</a></p>',
        '<p>O respóndeme a este correo si prefieres hablar.</p>',
        '<p>Saludos,<br><strong>Carlos — NetWebMedia</strong></p>',
      ].join('\n');
    }

    function modal(title, html, onOpen) {
      var m = document.createElement('div');
      m.className = 'nwm-modal-backdrop';
      m.innerHTML = '<div class="nwm-modal"><div class="nwm-modal-head"><h3>'+esc(title)+'</h3><button class="nwm-modal-close">×</button></div><div class="nwm-modal-body">'+html+'</div></div>';
      document.body.appendChild(m);
      m.querySelector('.nwm-modal-close').onclick = function(){ m.remove(); };
      m.addEventListener('click', function(e){ if(e.target===m) m.remove(); });
      if (onOpen) onOpen(m);
      return m;
    }

    function editor(c) {
      var isNew = !c;
      c = c || {
        name: 'Chile Prospect Outreach', subject: '{{company}} — plan de crecimiento con IA',
        from_name: 'Carlos — NetWebMedia', from_email: 'newsletter@netwebmedia.com',
        reply_to: 'carlos@netwebmedia.com',
        html_body: defaultHtml(),
        audience: { region: 'Metropolitana' },
        throttle_seconds: 2,
      };
      var regionOpts = ['','Metropolitana','Valparaíso','Biobío',"O'Higgins",'Maule','Coquimbo','La Araucanía','Los Lagos','Los Ríos','Antofagasta','Atacama','Arica y Parinacota','Tarapacá','Ñuble','Aysén','Magallanes','Otra'].map(function(r){
        return '<option value="'+esc(r)+'"'+((c.audience && c.audience.region===r)?' selected':'')+'>'+esc(r || 'Any region')+'</option>';
      }).join('');
      var html = [
        '<div class="row2">',
          '<label class="lbl">Campaign name<input class="inp" id="c-name" value="'+esc(c.name)+'"></label>',
          '<label class="lbl">Subject (personalizable)<input class="inp" id="c-subject" value="'+esc(c.subject)+'"></label>',
        '</div>',
        '<div class="row2">',
          '<label class="lbl">From name<input class="inp" id="c-from-name" value="'+esc(c.from_name)+'"></label>',
          '<label class="lbl">From email<input class="inp" id="c-from-email" value="'+esc(c.from_email)+'" readonly style="background:#f7f7fb;color:#666;"></label>',
        '</div>',
        '<label class="lbl">Reply-to<input class="inp" id="c-reply-to" value="'+esc(c.reply_to || '')+'"></label>',
        '<div class="row2">',
          '<label class="lbl">Audience: Region<select class="inp" id="c-region">'+regionOpts+'</select></label>',
          '<label class="lbl">Audience: Niche contains<input class="inp" id="c-niche" value="'+esc((c.audience && c.audience.niche) || '')+'"></label>',
        '</div>',
        '<label class="lbl">HTML body (use {{name}}, {{company}}, {{niche}}, {{city}}, {{pain_points}}, {{fit_services}})<textarea class="inp" id="c-body" rows="14" style="font-family:monospace;font-size:12px;">'+esc(c.html_body)+'</textarea></label>',
        '<div id="c-aud-box" class="aud-box">Audience: checking…</div>',
        '<div class="nwm-modal-foot">',
          '<button class="btn" id="c-preview-btn">Preview audience</button>',
          '<button class="btn" id="c-test-btn">Send test to me</button>',
          '<button class="btn btn-primary" id="c-save-btn">'+(isNew?'Save draft':'Save')+'</button>',
          '<button class="btn" id="c-cancel">Cancel</button>',
        '</div>',
      ].join('');

      modal(isNew ? 'New Campaign' : 'Edit: '+c.name, html, function(m) {
        function collect() {
          return {
            name: m.querySelector('#c-name').value.trim(),
            subject: m.querySelector('#c-subject').value.trim(),
            from_name: m.querySelector('#c-from-name').value.trim(),
            from_email: m.querySelector('#c-from-email').value.trim(),
            reply_to: m.querySelector('#c-reply-to').value.trim() || null,
            html_body: m.querySelector('#c-body').value,
            audience: {
              region: m.querySelector('#c-region').value || undefined,
              niche: m.querySelector('#c-niche').value || undefined,
            },
            throttle_seconds: 2,
          };
        }
        function updateAud() {
          var aud = collect().audience;
          var id = c.id;
          var p = id
            ? api('/campaigns/'+id+'/audience', { method:'POST', body: aud })
            : api('/campaigns', { method:'POST', body: Object.assign(collect(), {audience: aud}) }).then(function(r){
                c.id = r.id; return api('/campaigns/'+r.id+'/audience', {method:'POST', body: aud});
              });
          p.then(function(r){
            m.querySelector('#c-aud-box').innerHTML = '<strong>'+(r.count||0)+' recipient(s)</strong> match. Sample: '+
              ((r.sample||[]).map(function(s){return esc(s.company||s.name)+' ('+esc(s.region||'?')+')';}).join(' · ') || 'none');
          });
        }
        setTimeout(updateAud, 400);
        m.querySelector('#c-preview-btn').onclick = function(){ updateAud(); };
        m.querySelector('#c-save-btn').onclick = function() {
          var payload = collect();
          var p = c.id ? api('/campaigns/'+c.id, { method:'PUT', body: payload }) : api('/campaigns', { method:'POST', body: payload });
          p.then(function(r){ m.remove(); load(); }).catch(function(e){ alert('Save failed'); });
        };
        m.querySelector('#c-cancel').onclick = function(){ m.remove(); };
        m.querySelector('#c-test-btn').onclick = function() {
          var to = prompt('Send test email to:', 'carlos@netwebmedia.com');
          if (!to) return;
          // Need to save first if new
          var ensureId = c.id ? Promise.resolve(c.id) : api('/campaigns',{method:'POST', body: collect()}).then(function(r){c.id=r.id;return r.id;});
          ensureId.then(function(id){
            return api('/campaigns/'+id+'/test', { method:'POST', body: {to: to} });
          }).then(function(r){
            alert(r.ok ? 'Test sent to '+to+' — personalized for '+r.preview_personalized_for : 'Failed: '+(r.error||'?'));
          });
        };
      });
    }

    function preview(c) {
      api('/campaigns/'+c.id).then(function(r){
        var camp = r.campaign;
        var html = '<p><strong>Status:</strong> '+esc(camp.status)+' · <strong>Sent:</strong> '+camp.sent+'/'+camp.total_recipients+' · <strong>Opens:</strong> '+camp.opened+' · <strong>Clicks:</strong> '+camp.clicked+'</p>';
        html += '<iframe class="preview-frame" srcdoc="'+esc(camp.html_body)+'"></iframe>';
        html += '<h4 style="margin-top:20px;">Last 20 recipients</h4>';
        html += '<table class="mod-table"><thead><tr><th>Email</th><th>Status</th><th>Opened</th><th>Clicked</th><th>Sent at</th></tr></thead><tbody>'+
          (r.recent||[]).map(function(rr){
            return '<tr><td>'+esc(rr.email)+'</td><td>'+esc(rr.status)+'</td><td>'+(rr.opened_at||'—')+'</td><td>'+(rr.clicked_at||'—')+'</td><td>'+(rr.sent_at||'—')+'</td></tr>';
          }).join('')+'</tbody></table>';
        modal('Campaign: '+c.name, html);
      });
    }

    function load() {
      Promise.all([
        api('/campaigns'),
        api('/resources/contact?limit=1')
      ]).then(function(res){
        state.items = res[0].items || [];
        state.contacts_total = res[1].total || 0;
        render();
      });
    }

    document.addEventListener('click', function(e) {
      if (e.target.closest('#newCamp')) return editor(null);
      var t = e.target.closest('[data-act]');
      if (!t) return;
      var id = +t.dataset.id;
      var c = state.items.find(function(x){return x.id===id;});
      if (!c) return;
      var act = t.dataset.act;
      if (act === 'edit') return editor(c);
      if (act === 'preview') return preview(c);
      if (act === 'del') {
        if (confirm('Delete "'+c.name+'"?')) api('/campaigns/'+id,{method:'DELETE'}).then(load);
      }
      if (act === 'send') {
        if (!confirm('Send "'+c.name+'" to all matching contacts? This cannot be undone.')) return;
        api('/campaigns/'+id+'/send', {method:'POST'}).then(function(r){
          alert(r.ok ? 'Queued '+r.queued+' recipients. Sends will run via cron (~20/minute).' : 'Failed: '+(r.error||'?'));
          load();
        });
      }
      if (act === 'tick') {
        api('/campaigns/'+id+'/tick', {method:'POST'}).then(function(r){
          alert('Tick sent: '+r.sent_this_tick+' sent, '+r.failed_this_tick+' failed, '+r.pending_remaining+' pending.');
          load();
        });
      }
    });

    load();
  })();
  </script>
<script src="assets/nwm-i18n.js" defer></script>
</body>
</html>
