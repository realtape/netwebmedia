<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Admin Dashboard - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=8">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V71R6PD7C0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-V71R6PD7C0', { anonymize_ip: true });
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body">
        <div class="stats-grid" id="adminStatsGrid"></div>
        <div class="dashboard-grid">
          <div class="dashboard-col">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Users by Plan</h2>
              </div>
              <div id="planBreakdown"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Recent Signups</h2>
                <span id="userCount" class="stat-change positive"></span>
              </div>
              <div id="recentUsers"></div>
            </div>
          </div>
          <div class="dashboard-col">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Account Status</h2>
              </div>
              <div id="statusBreakdown"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Recent Demo Leads</h2>
              </div>
              <div id="recentLeads"></div>
            </div>
          </div>
        </div>
        <div class="card" style="margin-top:24px;">
          <div class="card-header">
            <h2 class="card-title">System Backup</h2>
            <span id="backupStatusBadge"></span>
          </div>
          <div id="backupStatus"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js?v=8"></script>
  <script src="js/org-switcher.js?v=1"></script>
  <script src="js/admin.js?v=1"></script>
  <script src="js/branding.js?v=1" defer></script>
  <script>
    /* Org switcher mount + master-only Sub-accounts nav injection.
       Runs after admin.js has built the header/sidebar via CRM_APP. */
    (function () {
      function mountSwitcher() {
        var headerRight = document.querySelector(".page-header .header-right");
        if (!headerRight || !window.nwmOrgSwitcher) return;
        if (document.getElementById("orgSwitcherSlot")) return;
        var slot = document.createElement("div");
        slot.id = "orgSwitcherSlot";
        headerRight.insertBefore(slot, headerRight.firstChild);
        var p = window.nwmOrgSwitcher.mount(slot);
        if (p && typeof p.then === "function") p.then(injectSubaccountsNav);
        else injectSubaccountsNav();
      }
      function injectSubaccountsNav() {
        if (!window.nwmOrgSwitcher || !window.nwmOrgSwitcher.isMasterOwner()) return;
        var nav = document.querySelector(".sidebar .sidebar-nav");
        if (!nav || nav.querySelector('[data-nav-id="subaccounts"]')) return;
        var a = document.createElement("a");
        a.href = "/crm-vanilla/subaccounts.html";
        a.className = "nav-item";
        a.title = "Sub-accounts";
        a.setAttribute("data-nav-id", "subaccounts");
        a.innerHTML =
          '<span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span>' +
          '<span class="nav-label">Sub-accounts</span>';
        nav.appendChild(a);
      }
      // The header/sidebar are populated by admin.js on DOMContentLoaded.
      // Wait one frame so .header-right exists, then mount.
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () { setTimeout(mountSwitcher, 0); });
      } else {
        setTimeout(mountSwitcher, 0);
      }
    })();
  </script>
  <script src="assets/nwm-i18n.js" defer></script>
  <script src="/assets/nwm-site-chat.js" defer></script>
</body>
</html>
