<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body">
        <div class="calendar-toolbar">
          <div class="calendar-nav">
            <button class="btn btn-secondary btn-sm" id="calPrev">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="week-label" id="weekLabel"></span>
            <button class="btn btn-secondary btn-sm" id="calNext">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <button class="btn btn-secondary btn-sm" id="calToday" data-i18n="modules.calendar.today">Today</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js?v=6"></script>
  <script src="js/calendar.js?v=2"></script>
</body>
</html>
