name: Cron — HubSpot Sync (every 6 hours)
on:
  schedule:
    # Every 6 hours at staggered times
    - cron: '17 0 * * *'
    - cron: '17 6 * * *'
    - cron: '17 12 * * *'
    - cron: '17 18 * * *'

jobs:
  hubspot-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Full HubSpot sync (contacts + deals)
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          # Token sent via X-Auth-Token header (not query string) so it doesn't
          # land in InMotion's Apache access log.
          curl -s -X GET \
            "https://netwebmedia.com/api/hubspot/sync" \
            -H "X-Auth-Token: ${HUBSPOT_TOKEN}" \
            -H "User-Agent: NetWebMedia-Cron" \
            --max-time 60 \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Health check
        run: |
          TOKEN="${{ secrets.JWT_SECRET }}"
          TOKEN="${TOKEN:0:16}"
          # Capture to variable instead of piping to jq directly — under
          # `set -o pipefail` curl can hit SIGPIPE when jq closes early.
          resp=$(curl -s -X GET \
            "https://netwebmedia.com/api/cron/health?token=${TOKEN}" \
            -H "User-Agent: NetWebMedia-Cron" \
            --max-time 30)
          echo "$resp" | jq '.' || echo "$resp"
