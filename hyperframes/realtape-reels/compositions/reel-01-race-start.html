<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
      .clip { position: absolute; top: 0; left: 0; }
      .broll { position: absolute; top:0; left:0; width: 1080px; height: 1920px; object-fit: cover; }
      .broll-tint-bottom { position: absolute; top:0; left:0; width: 1080px; height: 1920px; background: linear-gradient(180deg, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.0) 35%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.85) 100%); }
      .broll-tint-top { position: absolute; top:0; left:0; width: 1080px; height: 1920px; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 18%, rgba(0,0,0,0.0) 32%); }
      .handle { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: 800; font-size: 32px; letter-spacing: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.7); opacity: 0.95; }
      .handle .at { color: #FF1A1A; }
      #hook { position: absolute; top: 280px; left: 60px; width: 960px; opacity: 0; }
      #hook-eyebrow { color: #FF1A1A; font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 22px; text-shadow: 0 2px 8px rgba(0,0,0,0.85); }
      #hook-headline { color: #fff; font-size: 110px; font-weight: 900; line-height: 0.96; text-transform: uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.9); letter-spacing: -1px; }
      #hook-headline .accent { color: #FF1A1A; }
      #hud { position: absolute; top: 760px; left: 60px; width: 480px; opacity: 0; background: rgba(0,0,0,0.72); border-left: 6px solid #FF1A1A; padding: 26px 32px; backdrop-filter: blur(8px); }
      #hud-label { color: #FF1A1A; font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
      #hud-val { color: #fff; font-size: 64px; font-weight: 900; line-height: 1; }
      #hud-sub { color: rgba(255,255,255,0.8); font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 400; margin-top: 6px; }
      #build { position: absolute; top: 1120px; left: 60px; width: 960px; opacity: 0; }
      #build-text { color: #fff; font-family: 'Inter', sans-serif; font-size: 44px; font-weight: 700; line-height: 1.15; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
      #build-text .accent { color: #FF1A1A; }
      #cta { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: 960px; text-align: center; opacity: 0; }
      #cta-line1 { color: #fff; font-size: 40px; font-weight: 800; line-height: 1.1; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.9); margin-bottom: 14px; }
      #cta-handle { display: inline-block; background: #FF1A1A; color: #fff; font-size: 38px; font-weight: 800; padding: 18px 38px; border-radius: 60px; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 8px 28px rgba(255,26,26,0.45); }
      #progress { position: absolute; bottom: 0; left: 0; width: 0; height: 8px; background: #FF1A1A; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="reel-01-race-start" data-start="0" data-duration="30" data-width="1080" data-height="1920">
      <video id="broll" class="broll clip" muted autoplay loop src="../assets/broll/clip-01-start.mp4" data-start="0" data-duration="30" data-track-index="0"></video>
      <div class="broll-tint-top clip" data-start="0" data-duration="30" data-track-index="1"></div>
      <div class="broll-tint-bottom clip" data-start="0" data-duration="30" data-track-index="2"></div>
      <div class="handle clip" data-start="0" data-duration="30" data-track-index="3"><span class="at">@</span>REALTAPE</div>
      <div id="hook" class="clip" data-start="0" data-duration="6" data-track-index="4">
        <div id="hook-eyebrow">// THE GREEN HELL</div>
        <div id="hook-headline">RACE<br>START AT<br>THE <span class="accent">'RING.</span></div>
      </div>
      <div id="hud" class="clip" data-start="6" data-duration="9" data-track-index="5">
        <div id="hud-label">TRACK</div>
        <div id="hud-val">20.832 <span style="font-size:32px;color:rgba(255,255,255,0.6)">KM</span></div>
        <div id="hud-sub">73 corners. Zero margin.</div>
      </div>
      <div id="build" class="clip" data-start="15" data-duration="8" data-track-index="6">
        <div id="build-text">BMW M4 GT4 EVO.<br>iRacing Falken Tyre<br><span class="accent">Sports Car Challenge.</span></div>
      </div>
      <div id="cta" class="clip" data-start="23" data-duration="7" data-track-index="7">
        <div id="cta-line1">FULL RACE ON THE CHANNEL</div>
        <div id="cta-handle">@REALTAPE</div>
      </div>
      <div id="progress" class="clip" data-start="0" data-duration="30" data-track-index="98"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#hook", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.1)
        .to("#hook", { opacity: 0, y: -30, duration: 0.4, ease: "power2.in" }, 5.4);
      tl.fromTo("#hud", { opacity: 0, x: -60 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 6.0)
        .to("#hud", { opacity: 0, x: -30, duration: 0.4, ease: "power2.in" }, 14.4);
      tl.fromTo("#build", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 15.1)
        .to("#build", { opacity: 0, y: -20, duration: 0.4, ease: "power2.in" }, 22.4);
      tl.fromTo("#cta", { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 23.1);
      tl.fromTo("#progress", { width: 0 }, { width: 1080, duration: 30, ease: "none" }, 0);
      window.__timelines["reel-01-race-start"] = tl;
    </script>
  </body>
</html>
