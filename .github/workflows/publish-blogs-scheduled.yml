name: Publish Blog Posts (Scheduled)

# Runs every hour from 11:00–20:00 UTC = 7 AM–4 PM Santiago (UTC-4).
# Cron schedules 10 windows/day, but GitHub Actions typically delivers
# only 3–4 of them due to scheduling throttle on busy queues. To hit the
# ~15 posts/day programmatic target, we publish 4 posts per fire:
#   3 fires × 4 posts = 12/day (floor)
#   4 fires × 4 posts = 16/day (target)
#   5 fires × 4 posts = 20/day (ceiling on a good queue day)
# Posts are read from _deploy/posts-queue/*.json (pre-written queue;
# generate-blog-queue.yml refills it weekly ~140/run).
# After publishing, blog/*.html + blog.html + sitemap.xml are committed,
# which triggers deploy-site-root.yml.

on:
  schedule:
    - cron: '0 11-20 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of posts to publish (default: 4)'
        default: '4'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check queue
        id: queue
        run: |
          COUNT=$(find _deploy/posts-queue -maxdepth 1 -name '*.json' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Pending posts: $COUNT"

      - name: Generate posts from queue
        id: generate
        if: steps.queue.outputs.pending != '0'
        run: |
          LIMIT="${{ github.event.inputs.limit || '4' }}"
          node _deploy/generate-blogs.js --limit "$LIMIT"
          COUNT=$(git status --porcelain | wc -l)
          echo "changed=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Posts changed: $COUNT file(s)"

      - name: Regenerate sitemap
        if: steps.generate.outputs.changed != '0'
        run: python3 _deploy/regen-sitemap.py

      - name: Commit and push published posts
        if: steps.generate.outputs.changed != '0'
        run: |
          git config user.name "NWM Blog Bot"
          git config user.email "bot@netwebmedia.com"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git add blog/ blog.html _deploy/posts-queue/ sitemap.xml
          git commit -m "publish: auto-publish $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Retry push with rebase --autostash for concurrent push + unstaged residuals
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase --autostash origin/main; then
              if git push origin HEAD:main; then
                echo "Pushed on attempt $attempt"
                exit 0
              fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            echo "Push attempt $attempt failed — retrying after $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: No posts in queue
        if: steps.queue.outputs.pending == '0'
        run: echo "Queue is empty — add JSON files to _deploy/posts-queue/ to schedule posts."
