<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy border circle -->
  <circle cx="256" cy="256" r="248" fill="#1a2d5a" stroke="none"/>
  <!-- White inner border -->
  <circle cx="256" cy="256" r="234" fill="#ffffff" stroke="none"/>
  <!-- Orange circle -->
  <circle cx="256" cy="256" r="224" fill="#f47920" stroke="none"/>
  <!-- White horizontal band -->
  <rect x="32" y="200" width="448" height="112" fill="#ffffff"/>
  <!-- NWM text — dominant-baseline and text-anchor for true centering -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="120" fill="#1a2d5a" letter-spacing="2">NWM</text>
  <!-- Navy border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#1a2d5a" stroke-width="16"/>
  <circle cx="256" cy="256" r="234" fill="none" stroke="#ffffff" stroke-width="4"/>
</svg>
