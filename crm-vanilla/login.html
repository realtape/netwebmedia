<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your Free Demo - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-gradient-line"></div>
    <div class="login-header">
      <div class="login-brand">
        <div class="brand-icon">N</div>
        <span class="login-brand-text">NetWeb CRM</span>
      </div>
      <h1 class="login-title">Start Your Free Demo</h1>
      <p class="login-subtitle">Enter your details to explore the platform</p>
    </div>
    <form id="loginForm" class="login-form">
      <div id="loginError" class="login-error"></div>
      <div class="login-field">
        <label class="login-label" for="inputName">Full Name</label>
        <input type="text" id="inputName" class="login-input" placeholder="John Smith" required autocomplete="name">
      </div>
      <div class="login-field">
        <label class="login-label" for="inputEmail">Email Address</label>
        <input type="email" id="inputEmail" class="login-input" placeholder="john@company.com" required autocomplete="email">
      </div>
      <button type="submit" id="loginBtn" class="login-btn">Launch Demo</button>
    </form>
    <div class="login-footer">
      <p class="login-signin">Already on a plan? <a href="#">Sign in</a></p>
      <p class="login-terms">By continuing, you agree to our Terms of Service</p>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
