  <text x="78" y="345" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="78" fill="#FFFFFF">Five jobs it</text>
  <text x="78" y="430" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="78" fill="#FF671F">never sleeps on</text>

  <g font-family="'Helvetica Neue', Arial, sans-serif">
