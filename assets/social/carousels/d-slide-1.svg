<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <radialGradient id="glow" cx="50%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#FF671F" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#FF671F" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF671F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#021046"/>
      <stop offset="100%" stop-color="#010A29"/>
    </linearGradient>
    <linearGradient id="vign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="#010A29" stop-opacity="0"/>
      <stop offset="100%" stop-color="#010A29" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- node network motif, lower right, subtle -->
  <g stroke="#FF671F" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path d="M760 980 L900 920 L980 1030 L840 1090 Z"/>
    <path d="M900 920 L840 1090 M760 980 L980 1030"/>
  </g>
  <g fill="#FF671F" fill-opacity="0.35">
    <circle cx="760" cy="980" r="7"/><circle cx="900" cy="920" r="7"/>
    <circle cx="980" cy="1030" r="7"/><circle cx="840" cy="1090" r="7"/>
  </g>

  <!-- brand lockup -->
  <rect x="80" y="92" width="26" height="26" rx="7" fill="#FF671F"/>
  <text x="122" y="113" font-family="'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="3" fill="#FFFFFF">NETWEBMEDIA</text>
  <text x="1000" y="113" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="4" fill="#8499B8">AI GROWTH</text>

  <!-- title -->
  <text x="78" y="500" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="130" fill="#FF671F">LEADS ON</text>
  <text x="78" y="632" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="130" fill="#FFFFFF">AUTOPILOT</text>

  <rect x="84" y="712" width="120" height="6" rx="3" fill="#FF671F"/>
  <text x="80" y="792" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="50" fill="#F4F1EA">what AI does while you sleep</text>

  <!-- hook -->
  <text x="80" y="1130" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="46" fill="#FFFFFF">your website should be</text>
  <text x="80" y="1192" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="46" fill="#FFFFFF">closing for you<tspan fill="#FF671F">…</tspan></text>

  <rect width="1080" height="1350" fill="url(#vign)"/>

  <!-- footer -->
  <text x="80" y="1300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1" fill="#F4F1EA">@netwebmedia</text>
  <text x="1000" y="1300" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1" fill="#FF671F">save for later &#8594;</text>
  <text x="540" y="1300" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" letter-spacing="3" fill="#5E76A0">01 / 06</text>
</svg>
