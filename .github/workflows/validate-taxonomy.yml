name: Validate niche taxonomy

# Enforce CLAUDE.md hard-constraint #1: exactly 14 niches.
#
# Fails the build if any directory exists under industries/ whose slug
# is not in the canonical 14-niche allowlist. Catches the regression
# that PR #5 introduced (tech-saas as an unsanctioned 15th niche, see
# issue #8 for context — Carlos confirmed 14 stays as the policy).

on:
  push:
    branches: [main]
    paths:
      - 'industries/**'
      - '.github/workflows/validate-taxonomy.yml'
  pull_request:
    paths:
      - 'industries/**'
  workflow_dispatch:

jobs:
  check-allowlist:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Verify industries/ contains only the canonical 14 niches
        run: |
          # Canonical 14 (folder slugs as deployed under industries/)
          ALLOWED=(
            automotive
            beauty
            education
            events-weddings
            finance
            healthcare
            home-services
            hospitality
            legal-services
            local-services
            real-estate
            restaurants
            smb
            wine-agriculture
          )

          # Find every direct child directory under industries/
          mapfile -t ACTUAL < <(find industries -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          UNEXPECTED=()
          for slug in "${ACTUAL[@]}"; do
            found=0
            for ok in "${ALLOWED[@]}"; do
              if [ "$slug" = "$ok" ]; then found=1; break; fi
            done
            if [ "$found" -eq 0 ]; then
              UNEXPECTED+=("$slug")
            fi
          done

          MISSING=()
          for ok in "${ALLOWED[@]}"; do
            found=0
            for slug in "${ACTUAL[@]}"; do
              if [ "$slug" = "$ok" ]; then found=1; break; fi
            done
            if [ "$found" -eq 0 ]; then
              MISSING+=("$ok")
            fi
          done

          echo "Found ${#ACTUAL[@]} industry directories: ${ACTUAL[*]}"

          fail=0
          if [ "${#UNEXPECTED[@]}" -gt 0 ]; then
            echo "::error::Off-taxonomy industry directories found: ${UNEXPECTED[*]}"
            echo "::error::Per CLAUDE.md hard-constraint #1, only these 14 are permitted: ${ALLOWED[*]}"
            echo "::error::If you need a new niche, update CLAUDE.md, the CRM enum, niche-sequences.json, AEO clusters, and .htaccess together — not silently."
            fail=1
          fi
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::Missing canonical industries: ${MISSING[*]}"
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "✓ All 14 canonical niches present, no off-taxonomy directories"
