<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80">
  <!-- NWM Circle Badge — Gulf Oil palette -->
  <g transform="translate(40,40)">
    <!-- Gulf Blue outer ring -->
    <circle cx="0" cy="0" r="36" fill="#003B80"/>
    <!-- White ring gap -->
    <circle cx="0" cy="0" r="33" fill="#ffffff"/>
    <!-- Gulf Orange fill -->
    <circle cx="0" cy="0" r="31" fill="#FF6600"/>
    <!-- White center band -->
    <rect x="-36" y="-8.5" width="72" height="17" fill="#ffffff"/>
    <!-- NWM text in Gulf Blue -->
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="'Arial Black','Impact',sans-serif"
          font-weight="900" font-size="16" fill="#003B80"
          letter-spacing="0.5">NWM</text>
    <!-- Gulf Blue outer stroke -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#003B80" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="#ffffff" stroke-width="0.8"/>
  </g>

  <!-- NetWebMedia Wordmark — Gulf Oil palette -->
  <text x="88" y="40" font-family="'Poppins','Montserrat','Inter',sans-serif" font-weight="800"
        font-size="34" letter-spacing="-0.5" dominant-baseline="central">
    <tspan fill="#003B80">Net</tspan><tspan fill="#FF6600">Web</tspan><tspan fill="#003B80">Media</tspan>
  </text>
</svg>
