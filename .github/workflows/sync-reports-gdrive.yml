name: Sync Reports → Google Drive (weekly)

on:
  schedule:
    # Weekly on Monday 9:15 UTC (2:15 AM Santiago time)
    - cron: '15 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no sync)'
        type: boolean
        default: false

jobs:
  sync-gdrive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Google API client
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Sync reports to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT }}
          GDRIVE_REPORTS_FOLDER_ID: ${{ secrets.GDRIVE_REPORTS_FOLDER_ID }}
        run: |
          python _deploy/sync-reports-gdrive.py

      - name: Summary
        run: echo "Report sync to Google Drive complete at $(date -u)"
