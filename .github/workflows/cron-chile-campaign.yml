name: Cron — Chile Cold Outreach (every 1 min, send-all mode)
on:
  schedule:
    # Every minute × n=50 with 1s throttle = ~50/min = 3,000/hour.
    # Clears the remaining ~3,400 leads in ~70 minutes. Concurrency group
    # prevents overlap, so if a call takes >1 min the next one queues.
    # Throttle this BACK to every 5 min once the list is drained.
    - cron: '* * * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche key filter (optional, e.g. law_firms, beauty)'
        required: false
        default: ''
      batch:
        description: 'Max sends per call (default 50, hard-capped at 50)'
        required: false
        default: '50'

concurrency:
  group: chile-cold-outreach
  cancel-in-progress: false

jobs:
  chile-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Send next batch
        run: |
          NICHE="${{ github.event.inputs.niche }}"
          BATCH="${{ github.event.inputs.batch || '50' }}"
          # Token currently lives embedded in api-php/chile-send.php (already in
          # the public repo); using GH secret if set, otherwise fall back.
          TOKEN="${{ secrets.CHILE_SEND_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="ADBUx9pVMR3hl3ChDLCegudz2xp_5y_0pSxG_jYVjjI"
          fi
          URL="https://netwebmedia.com/api/chile-send?token=${TOKEN}&mode=batch&n=${BATCH}"
          if [ -n "$NICHE" ]; then
            URL="${URL}&niche=${NICHE}"
          fi
          # Full Chrome UA + Origin + Referer to bypass mod_security on InMotion.
          curl -s "$URL" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Origin: https://netwebmedia.com" \
            -H "Referer: https://netwebmedia.com/crm-vanilla/chile-campaign.html" \
            -w "\nHTTP Status: %{http_code}\n"
