name: Cleanup audit smoke-test lead (one-shot)

# One-time workflow to remove the test contact created during the 2026-05-06
# website + CRM audit smoke test. The audit POSTed to /api/public/forms/submit
# with email audit-smoke-test+nwm@example.com, creating Lead/form_submission #22.
#
# Calls api-php/_cleanup_audit_lead.php which deletes any rows matching
# '%audit-smoke-test%' in form_submissions, resources (type='contact'), and
# activity_log. Idempotent — safe to re-run.
#
# After the workflow has reported `"ok": true` and counts look right, you can
# remove api-php/_cleanup_audit_lead.php and this workflow file.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this?'
        required: false
        default: 'Post-audit test data cleanup'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup endpoint
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::JWT_SECRET secret is unset — cannot derive cleanup token"
            exit 1
          fi
          token="${JWT_SECRET:0:16}"

          echo "Calling /api/_cleanup_audit_lead.php..."
          # Browser-style headers — mod_security on InMotion 406-blocks bare curl UAs.
          resp=$(curl -sS --max-time 60 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "Accept: application/json,text/plain,*/*" \
            -H "Origin: https://netwebmedia.com" \
            -H "Referer: https://netwebmedia.com/" \
            "https://netwebmedia.com/api/_cleanup_audit_lead.php?token=${token}")

          echo "Response:"
          echo "$resp"

          # Must contain "ok": true — otherwise fail the run
          echo "$resp" | grep -q '"ok": true' || {
            echo "::error::Cleanup endpoint did not return ok=true"
            exit 1
          }
          echo "Cleanup completed successfully."
