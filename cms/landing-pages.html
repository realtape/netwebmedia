<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Pages - NetWeb CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../crm/css/app.css">
  <link rel="stylesheet" href="css/cms.css">
  <style>
    .nwm-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999}
    .nwm-modal{background:#fff;color:#111;border-radius:12px;width:min(680px,92vw);max-height:90vh;overflow:auto}
    .nwm-modal-head{display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eee}.nwm-modal-head h3{margin:0}
    .nwm-modal-close{background:none;border:none;font-size:28px;cursor:pointer}.nwm-modal-body{padding:20px}.nwm-modal-foot{margin-top:16px;display:flex;gap:8px;justify-content:flex-end}
    .lbl{display:block;margin-bottom:14px;font-size:13px;color:#444}.inp{display:block;width:100%;padding:10px 12px;border:1px solid #d5d9e2;border-radius:8px;font-size:14px;margin-top:4px}
    .mod-table th,.mod-table td{padding:10px 12px;border-bottom:1px solid #eee;text-align:left;font-size:14px}.mod-table th{background:#f7f7fb;font-size:12px;text-transform:uppercase;color:#666}
    .btn-sm{padding:4px 10px;font-size:12px}.btn-danger{background:#e74c3c;color:#fff}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:14px}.stat-card .lbl{font-size:11px;color:#888;text-transform:uppercase}.stat-card .val{font-size:22px;font-weight:700;margin-top:4px}
    .url-code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;background:#f3f4f8;padding:2px 6px;border-radius:5px}
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body"><div id="stats" class="stat-grid"></div><div id="list"></div></div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/cms.js"></script>
  <script src="js/module-table.js"></script>
  <script>
    function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

    function renderStats(items) {
      var active = 0;
      items.forEach(function (it) { if (it.status === 'active' || it.status === 'published') active++; });
      document.getElementById('stats').innerHTML =
        '<div class="stat-card"><div class="lbl">Total LPs</div><div class="val">' + items.length + '</div></div>' +
        '<div class="stat-card"><div class="lbl">Active</div><div class="val">' + active + '</div></div>';
    }

    NWMApi.list('landing_page').then(function (r) { renderStats(r.items || []); }).catch(function(){});

    NWM.mount({
      type: 'landing_page',
      title: 'Landing Pages',
      subtitle: 'Build and manage campaign landing pages',
      listEl: 'list',
      columns: [
        { label: 'Title', key: 'title' },
        { label: 'URL', key: 'url', fmt: function (v) { return v ? '<code class="url-code">' + esc(v) + '</code>' : ''; } },
        { label: 'Funnel', key: 'funnel' },
        { label: 'Status', key: 'status' },
        { label: 'Updated', key: 'updated_at' },
      ],
      rowActions: [
        { act: 'open', label: 'Open' },
      ],
      onRow: function (act, it) {
        if (act === 'open') {
          var url = (it.data && it.data.url) || '';
          if (url) window.open(url.charAt(0) === '/' ? url : '/' + url, '_blank');
          else alert('No URL set for this landing page yet.');
        }
      },
      fields: [
        { name: 'title', label: 'Landing page title', type: 'text', required: true },
        { name: 'url', label: 'URL path (e.g. /lp/offer)', type: 'text', placeholder: '/lp/offer' },
        { name: 'funnel', label: 'Funnel / campaign', type: 'text' },
        { name: 'notes', label: 'Notes', type: 'textarea', rows: 3 },
        { name: 'status', label: 'Status', type: 'select', options: [
          { value: 'draft', label: 'Draft' }, { value: 'active', label: 'Active' },
          { value: 'paused', label: 'Paused' }, { value: 'archived', label: 'Archived' },
        ]},
      ],
    });
  </script>
<script src="assets/nwm-i18n.js?v=2" defer></script>
</body>
</html>
