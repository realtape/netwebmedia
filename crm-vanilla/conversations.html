<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversations - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="conversations-layout">
        <div class="conv-sidebar">
          <div class="conv-filters">
            <button class="channel-btn active" data-channel="all" data-i18n="modules.conversations.all">All</button>
            <button class="channel-btn" data-channel="email" data-i18n="modules.conversations.email">Email</button>
            <button class="channel-btn" data-channel="sms" data-i18n="modules.conversations.sms">SMS</button>
            <button class="channel-btn" data-channel="whatsapp" data-i18n="modules.conversations.whatsapp">WhatsApp</button>
          </div>
          <div class="conv-list" id="conversationList"></div>
        </div>
        <div class="chat-panel">
          <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
              <div class="conv-avatar chat-placeholder-avatar">?</div>
              <div><div class="chat-header-name chat-placeholder-text" data-i18n="modules.conversations.selectConv">Select a conversation</div></div>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input">
            <textarea id="messageInput" data-i18n-placeholder="modules.conversations.typeMsg" placeholder="Type your message..." rows="1"></textarea>
            <button class="btn btn-primary" id="sendBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js?v=6"></script>
  <script src="js/conversations.js?v=2"></script>
</body>
</html>
