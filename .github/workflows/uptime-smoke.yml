name: uptime-smoke
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe endpoints
        id: probe
        shell: bash
        run: |
          set -u
          # InMotion mod_security 406-blocks bare curl UAs — use full Chrome UA
          # (same posture as the migrate step in deploy-site-root.yml).
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          FAILED=""
          URLS=(
            "https://netwebmedia.com/"
            "https://netwebmedia.com/pricing.html"
            "https://netwebmedia.com/contact.html"
          )
          for u in "${URLS[@]}"; do
            code="000"
            for attempt in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 \
                -A "$UA" \
                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
                -H "Accept-Language: en-US,en;q=0.9" \
                "$u" || echo "000")
              echo "$u -> $code (attempt $attempt)"
              if [ "$code" = "200" ]; then
                break
              fi
              [ $attempt -lt 3 ] && sleep $((attempt * 5))
            done
            if [ "$code" != "200" ]; then
              FAILED="$FAILED\n- $u ($code)"
            fi
          done
          if [ -n "$FAILED" ]; then
            printf "FAILED=%b\n" "$FAILED" >> "$GITHUB_OUTPUT"
            echo "::error::One or more endpoints returned non-200 after 3 attempts:$FAILED"
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          payload=$(printf '{"text":"[NWM uptime] smoke test FAILED — run: %s"}' \
            "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          curl -s -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" || true
