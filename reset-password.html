<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Reset password · NetWebMedia</title>
<link rel="icon" type="image/svg+xml" href="/assets/nwm-logo.svg?v=2" />
<style>
  :root {
    --bg: #0b1020;
    --card: #121933;
    --fg: #eaf0ff;
    --muted: #8892b0;
    --accent: #6c5ce7;
    --accent2: #00b894;
    --err: #ff6b6b;
    --ok: #00d28f;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--fg);
    background: radial-gradient(1000px 600px at 15% 10%, #1a2555 0%, transparent 60%),
                radial-gradient(900px 500px at 85% 90%, #0f2942 0%, transparent 60%),
                var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .brand-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center; color: white; font-weight: 800;
  }
  .brand-text { font-weight: 700; font-size: 18px; }
  h1 { margin: 0 0 6px; font-size: 22px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.04); color: var(--fg);
    border: 1px solid var(--border); outline: none; font-size: 14px;
    transition: border-color .15s, background .15s;
  }
  input:focus { border-color: var(--accent); background: rgba(108,92,231,0.08); }
  .btn {
    margin-top: 20px; width: 100%; padding: 12px 16px; border-radius: 10px;
    border: none; background: linear-gradient(135deg, var(--accent), #8475ff);
    color: white; font-weight: 600; font-size: 14px; cursor: pointer;
    transition: transform .08s, opacity .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.6; cursor: wait; transform: none; }
  .alt { color: var(--muted); font-size: 13px; text-align: center; margin-top: 16px; }
  .alt a { color: var(--fg); text-decoration: none; border-bottom: 1px dashed var(--muted); }
  .msg { margin-top: 14px; font-size: 13px; min-height: 16px; }
  .msg.err { color: var(--err); }
  .msg.ok  { color: var(--ok); }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="nav-lang" style="position:fixed;top:14px;right:14px;z-index:99;"></div>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">N</div>
      <div class="brand-text">NetWebMedia</div>
    </div>
    <h1 data-en="Set a new password" data-es="Crea una nueva contraseña">Set a new password</h1>
    <div class="sub" data-en="Choose a new password for your account." data-es="Elige una nueva contraseña para tu cuenta.">Choose a new password for your account.</div>

    <form id="resetForm" autocomplete="on">
      <label for="password" data-en="New password" data-es="Nueva contraseña">New password</label>
      <input id="password" type="password" required autocomplete="new-password" minlength="8" placeholder="••••••••" />

      <label for="confirm" data-en="Confirm new password" data-es="Confirma la contraseña">Confirm new password</label>
      <input id="confirm" type="password" required autocomplete="new-password" minlength="8" placeholder="••••••••" />

      <button class="btn" id="submitBtn" type="submit" data-en="Update password" data-es="Actualizar contraseña">Update password</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="alt"><a href="/login.html" data-en="Back to sign in" data-es="Volver a iniciar sesión">Back to sign in</a></div>
  </div>

  <script>window.NWM_NO_GATE = true;</script>
  <script src="/js/api-client.js"></script>
  <script>
    (function () {
      var form    = document.getElementById('resetForm');
      var pass    = document.getElementById('password');
      var confirm = document.getElementById('confirm');
      var btn     = document.getElementById('submitBtn');
      var msg     = document.getElementById('msg');

      function curLang() {
        try {
          var l = (document.documentElement.lang || localStorage.getItem('nwm_lang') || '').toLowerCase();
          if (l.indexOf('es') === 0) return 'es';
          if (l.indexOf('en') === 0) return 'en';
        } catch (e) {}
        return (new URLSearchParams(location.search)).get('lang') === 'es' ? 'es' : 'en';
      }

      function token() {
        return (new URLSearchParams(location.search)).get('token') || '';
      }

      var T = {
        noToken:   { en: 'This reset link is invalid or has expired. Please request a new one.', es: 'Este enlace es inválido o expiró. Solicita uno nuevo.' },
        tooShort:  { en: 'Password must be at least 8 characters.', es: 'La contraseña debe tener al menos 8 caracteres.' },
        mismatch:  { en: 'Passwords don’t match.', es: 'Las contraseñas no coinciden.' },
        working:   { en: 'Updating your password…', es: 'Actualizando tu contraseña…' },
        success:   { en: 'Password updated. Redirecting you to sign in…', es: 'Contraseña actualizada. Te llevamos a iniciar sesión…' },
        invalid:   { en: 'This reset link is invalid or has expired. Please request a new one.', es: 'Este enlace es inválido o expiró. Solicita uno nuevo.' },
        connErr:   { en: 'Connection error. Please try again.', es: 'Error de conexión. Intenta de nuevo.' }
      };
      function t(k) { return T[k][curLang()]; }

      // If there's no token at all, disable the form up front.
      if (!token()) {
        btn.disabled = true;
        msg.className = 'msg err';
        msg.textContent = t('noToken');
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var tok = token();
        if (!tok) { msg.className = 'msg err'; msg.textContent = t('noToken'); return; }
        var p1 = pass.value, p2 = confirm.value;
        if (p1.length < 8) { msg.className = 'msg err'; msg.textContent = t('tooShort'); return; }
        if (p1 !== p2)     { msg.className = 'msg err'; msg.textContent = t('mismatch'); return; }

        btn.disabled = true;
        msg.className = 'msg';
        msg.textContent = t('working');

        window.NWMApi.resetPassword(tok, p1)
          .then(function () {
            msg.className = 'msg ok';
            msg.textContent = t('success');
            setTimeout(function () { location.href = '/login.html'; }, 1400);
          })
          .catch(function (err) {
            msg.className = 'msg err';
            // 400 = invalid/expired token; anything else = generic connection error.
            msg.textContent = (err && err.status === 400) ? t('invalid')
                            : (err && err.status === 422) ? t('tooShort')
                            : t('connErr');
            btn.disabled = false;
          });
      });
    })();
  </script>
  <script src="assets/nwm-i18n.js?v=2" defer></script>
  <script src="js/main.js?v=3" defer></script>
</body>
</html>
