name: Run segment migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Add segment column + backfill
        run: |
          RESP=$(curl -s -X POST --max-time 60             -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"             -H "Content-Type: application/json"             "https://app.netwebmedia.com/api/index.php?r=migrate&token=NWM_MIGRATE_2026&schema=segment")
          echo "$RESP"
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('ran:', d.get('ran'), 'errors:', d.get('errors')); exit(0 if not d.get('errors') else 1)"
