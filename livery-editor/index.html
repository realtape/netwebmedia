<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NWM Livery Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/editor.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <header id="topbar">
      <div class="tb-left">
        <div class="logo">
          <svg viewBox="0 0 32 32" width="24" height="24"><path d="M2 22 Q16 6 30 22" stroke="#FF671F" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="16" cy="20" r="4" fill="#FF671F"/></svg>
          <span>Livery Editor</span>
        </div>
        <div class="tb-divider"></div>
        <select id="car-select" title="Car template">
          <option value="stock">NASCAR Stock Car</option>
          <option value="gt3">GT3 Sports Car</option>
          <option value="formula">Formula Single-Seater</option>
          <option value="rally">Rally / Road Car</option>
        </select>
      </div>

      <div class="tb-center">
        <button id="btn-undo" class="tb-btn" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="currentColor"/></svg>
          Undo
        </button>
        <button id="btn-redo" class="tb-btn" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18.4 10.6C16.55 9 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" fill="currentColor"/></svg>
          Redo
        </button>
        <div class="tb-divider"></div>
        <label class="tb-label">Zoom</label>
        <select id="zoom-select">
          <option value="0.25">25%</option>
          <option value="0.5" selected>50%</option>
          <option value="0.75">75%</option>
          <option value="1">100%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
        </select>
        <div class="tb-divider"></div>
        <label class="toggle-wrap">
          <input type="checkbox" id="show-template" checked>
          <span>Template</span>
        </label>
        <label class="toggle-wrap">
          <input type="checkbox" id="show-labels">
          <span>Labels</span>
        </label>
      </div>

      <div class="tb-right">
        <select id="export-size" title="Export resolution">
          <option value="512">1024 × 512</option>
          <option value="1024" selected>2048 × 1024</option>
          <option value="2048">4096 × 2048</option>
        </select>
        <button id="btn-export" class="btn-primary">
          <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
          Export PNG
        </button>
        <button id="btn-new" class="btn-danger" title="Start fresh">New</button>
      </div>
    </header>

    <!-- Workspace -->
    <div id="workspace">

      <!-- Left Panel: Tools + Color -->
      <aside id="left-panel">
        <div class="panel-section">
          <div class="panel-title">TOOLS</div>
          <div id="tools-grid">
            <button class="tool-btn active" data-tool="select" title="Select  V">
              <svg viewBox="0 0 24 24"><path d="M4 0l16 12.5-7 1.2-4.2 7.3z" fill="currentColor"/></svg>
              <span>Select</span>
            </button>
            <button class="tool-btn" data-tool="brush" title="Brush  B">
              <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37-1.34-1.34a1 1 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a1 1 0 0 0 0-1.41z" fill="currentColor"/></svg>
              <span>Brush</span>
            </button>
            <button class="tool-btn" data-tool="fill" title="Fill  F">
              <svg viewBox="0 0 24 24"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15a1.49 1.49 0 0 0 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10 10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z" fill="currentColor"/></svg>
              <span>Fill</span>
            </button>
            <button class="tool-btn" data-tool="gradient" title="Gradient">
              <svg viewBox="0 0 24 24"><defs><linearGradient id="tg" x1="0%" x2="100%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="#888"/></linearGradient></defs><rect x="3" y="7" width="18" height="10" rx="2" fill="url(#tg)"/></svg>
              <span>Gradient</span>
            </button>
            <button class="tool-btn" data-tool="rect" title="Rectangle  R">
              <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
              <span>Rect</span>
            </button>
            <button class="tool-btn" data-tool="circle" title="Circle  C">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
              <span>Circle</span>
            </button>
            <button class="tool-btn" data-tool="triangle" title="Triangle">
              <svg viewBox="0 0 24 24"><path d="M12 3 22 21H2Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
              <span>Triangle</span>
            </button>
            <button class="tool-btn" data-tool="line" title="Line">
              <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
              <span>Line</span>
            </button>
            <button class="tool-btn" data-tool="text" title="Text  T">
              <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z" fill="currentColor"/></svg>
              <span>Text</span>
            </button>
            <button class="tool-btn" data-tool="image" title="Add Image">
              <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1.1 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" fill="currentColor"/></svg>
              <span>Image</span>
            </button>
            <button class="tool-btn" data-tool="eyedropper" title="Eyedropper  I">
              <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.41 1.41L6 14.25V18h3.75l6.01-6.01 1.42 1.41 1.41-1.41-1.42-1.42 3.12-3.12a1 1 0 0 0 0-1.82z" fill="currentColor"/></svg>
              <span>Picker</span>
            </button>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">BRUSH</div>
          <div class="slider-row">
            <label>Size</label>
            <input type="range" id="brush-size" min="1" max="200" value="20" class="slider">
            <span id="brush-size-val" class="val">20</span>
          </div>
          <div class="slider-row">
            <label>Opacity</label>
            <input type="range" id="brush-opacity" min="1" max="100" value="100" class="slider">
            <span id="brush-opacity-val" class="val">100</span>
          </div>
          <div class="slider-row">
            <label>Softness</label>
            <input type="range" id="brush-softness" min="0" max="100" value="0" class="slider">
            <span id="brush-softness-val" class="val">0</span>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">COLOR</div>
          <div id="color-row">
            <div id="color-bg-swatch" class="color-block secondary" title="Secondary (background)"></div>
            <div id="color-fg-swatch" class="color-block primary" title="Primary (foreground)"></div>
            <button id="btn-swap-colors" title="Swap colors">⇆</button>
            <button id="btn-reset-colors" title="Reset to default">↺</button>
          </div>
          <input type="color" id="color-picker-fg" value="#FF671F">
          <input type="color" id="color-picker-bg" value="#010F3B">
          <div id="swatches-grid"></div>
        </div>
      </aside>

      <!-- Canvas Area -->
      <main id="canvas-area">
        <div id="canvas-scroll">
          <div id="canvas-wrapper">
            <canvas id="editor-canvas"></canvas>
            <canvas id="template-overlay"></canvas>
          </div>
        </div>
        <div id="statusbar">
          <span id="sb-pos">0, 0</span>
          <span id="sb-size">2048 × 1024</span>
          <span id="sb-tool">Select Tool</span>
          <span id="sb-layer">Layer 1</span>
        </div>
      </main>

      <!-- Right Panel: Layers + Properties -->
      <aside id="right-panel">
        <div class="panel-section flex-section">
          <div class="panel-header">
            <div class="panel-title">LAYERS</div>
            <div class="panel-btns">
              <button id="btn-layer-add" title="New layer">+</button>
              <button id="btn-layer-dup" title="Duplicate layer">⧉</button>
              <button id="btn-layer-del" title="Delete layer">✕</button>
              <button id="btn-layer-up" title="Move up">↑</button>
              <button id="btn-layer-down" title="Move down">↓</button>
            </div>
          </div>
          <div id="layers-list"></div>
        </div>

        <div class="panel-section">
          <div class="panel-title">LAYER PROPERTIES</div>
          <div class="slider-row">
            <label>Opacity</label>
            <input type="range" id="layer-opacity" min="0" max="100" value="100" class="slider">
            <span id="layer-opacity-val" class="val">100%</span>
          </div>
          <div class="prop-row">
            <label>Blend</label>
            <select id="layer-blend">
              <option value="normal">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
              <option value="color-dodge">Color Dodge</option>
              <option value="color-burn">Color Burn</option>
              <option value="hard-light">Hard Light</option>
              <option value="soft-light">Soft Light</option>
              <option value="difference">Difference</option>
              <option value="exclusion">Exclusion</option>
            </select>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">SELECTION</div>
          <div id="obj-props">
            <div class="no-sel">No object selected</div>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">TEMPLATE OPACITY</div>
          <div class="slider-row">
            <label>Guide</label>
            <input type="range" id="template-opacity" min="5" max="100" value="40" class="slider">
            <span id="template-opacity-val" class="val">40%</span>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Hidden inputs -->
  <input type="file" id="image-upload" accept="image/*" style="display:none">

  <script src="js/templates.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
