<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- NetWebMedia favicon / app icon — 2026-05-12 refresh.
       Navy rounded square + lowercase "nwm" wordmark in brand colors
       (sky blue #5DB4E5 + orange #FF671F). Mirrors the horizontal wordmark
       style at icon scale. -->
  <rect width="512" height="512" rx="96" fill="#010F3B"/>
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="220"
        letter-spacing="-12">
    <tspan fill="#5DB4E5">n</tspan><tspan fill="#FF671F">w</tspan><tspan fill="#5DB4E5">m</tspan>
  </text>
</svg>
