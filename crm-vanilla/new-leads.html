<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>New Leads · NetWebMedia CRM</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:,">
  <style>
    :root{
      --navy:#010F3B; --navy-2:#0d1b3e; --orange:#FF671F;
      --ink:#e6edf7; --muted:#7B8FAD; --border:rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:Inter,'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.5;min-height:100vh}
    a{color:var(--orange);text-decoration:none}
    a:hover{text-decoration:underline}
    header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;background:linear-gradient(180deg,rgba(255,103,31,0.04),transparent)}
    h1{margin:0;font-size:18px;font-weight:700;color:#fff;letter-spacing:.01em}
    h1 .dot{color:var(--orange);margin:0 6px}
    h1 small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px}
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
    .toggle input{accent-color:var(--orange);cursor:pointer}
    .btn{background:var(--orange);color:#000;border:0;padding:7px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit}
    .btn:hover{filter:brightness(1.1)}
    .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--border)}
    .meta{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
    main{padding:24px 28px;max-width:1100px;margin:0 auto}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px}
    .stat{background:var(--navy-2);border:1px solid var(--border);padding:14px 16px;border-radius:8px}
    .stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
    .stat .val{font-size:26px;font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
    .stat.today{border-color:rgba(255,103,31,0.35)}
    .stat.today .val{color:var(--orange)}
    .day{margin-bottom:26px}
    .day h2{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:0 0 10px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .day h2 .count{color:#fff;font-weight:700;font-size:13px}
    .day.today h2{color:var(--orange)}
    .leads{display:grid;gap:6px}
    .lead{background:var(--navy-2);border:1px solid var(--border);border-left:3px solid var(--orange);padding:11px 14px;border-radius:6px;display:grid;grid-template-columns:80px 1fr auto auto;gap:14px;align-items:center;transition:background .12s}
    .lead:hover{background:#10224a}
    .lead.cold{border-left-color:var(--muted);opacity:.72}
    .lead .time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
    .lead .who{font-weight:600;color:#fff;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lead .who small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lead .src{font-size:10px;color:var(--muted);background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
    .lead .niche{font-size:12px;color:var(--orange);white-space:nowrap}
    .empty{text-align:center;color:var(--muted);padding:36px;font-size:14px;background:var(--navy-2);border:1px dashed var(--border);border-radius:8px}
    .err{background:#4a1419;border:1px solid #ff4d4f;color:#ffd7d9;padding:14px 16px;border-radius:6px;margin-bottom:20px;font-size:14px}
    .nav{font-size:12px;color:var(--muted);margin-top:24px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
    @media (max-width:760px){
      header{padding:14px 16px}
      main{padding:16px}
      .lead{grid-template-columns:1fr;gap:6px;padding:12px}
      .lead .time{font-size:11px}
      h1{font-size:16px}
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1>New Leads <span class="dot">·</span> daily<small>Inbound contacts feed · auto-refresh every 5 min</small></h1>
  </div>
  <div class="controls">
    <label class="toggle"><input type="checkbox" id="showCold"> Show cold imports</label>
    <button class="btn ghost" id="refreshBtn" title="Refresh now">↻ Refresh</button>
    <span class="meta" id="lastSync">—</span>
  </div>
</header>
<main>
  <div id="errBox"></div>
  <div class="stats" id="stats"></div>
  <div id="feed"></div>
  <div class="nav">
    <a href="/crm-vanilla/">← CRM dashboard</a>
    &nbsp;·&nbsp;
    <a href="/crm-vanilla/pipeline.html">Pipeline</a>
  </div>
</main>
<script>
(() => {
  // Cold/synthetic sources to dim by default. Inbound = everything else.
  const COLD_RX = /^(chile_|usa_|deep-audit|web-prospecting|claude-|audit-test|nwm-launch|prelaunch-)/i;
  const SOURCE_LABEL = {
    'footer-homepage': 'Footer newsletter',
    'newsletter': 'Newsletter',
    'newsletter-footer': 'Footer newsletter',
    'blog-top': 'Blog (top)',
    'form:Contact — Main': 'Contact form',
    'form:Free Audit Request': 'Audit request',
    'form:Webinar Registration Q2': 'Webinar reg',
    'form:Demo Booking': 'Demo booking',
    'form:Newsletter — Footer': 'Footer newsletter',
    'form:ROI Calculator Save Results': 'ROI calculator',
    'form:Case Study Download Gate': 'Case study DL',
    'inbound_website': 'Inbound (website)',
    'whatsapp': 'WhatsApp',
    'referral': 'Referral',
    'chile_scrape_2026': 'Chile scrape',
    'chile_scrape_2026_all': 'Chile scrape',
    'chile_live_contacts': 'Chile (live)',
    'deep-audit': 'Deep audit (cold)',
    'web-prospecting-2026-04': 'Outbound (Apr 2026)'
  };

  let SHOW_COLD = false;
  let CACHE = null;

  const $ = s => document.querySelector(s);
  const esc = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const startOfDay = d => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
  const todayStart = startOfDay(new Date());
  const dayKey = d => { const x = startOfDay(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); };
  const fmtTime = d => d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});

  function dayLabel(keyStr) {
    const [y,m,d] = keyStr.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const diff = Math.round((todayStart - dt) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7)  return dt.toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'});
    return dt.toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'});
  }

  function classify(c) {
    const d = c.data || {};
    // Backend stores created_at in UTC ("YYYY-MM-DD HH:MM:SS"); treat as UTC.
    const created = new Date((c.created_at||'').replace(' ','T') + 'Z');
    const src = d.source || '';
    return {
      id: c.id,
      created,
      name: d.name || ((d.first_name||'') + ' ' + (d.last_name||'')).trim() || c.title || '',
      email: d.email || '',
      company: d.company || d.company_name || '',
      source: src,
      niche: d.niche || d.industry || '',
      cold: COLD_RX.test(src)
    };
  }

  async function fetchData() {
    const TOK = localStorage.getItem('nwm_token');
    if (!TOK) {
      $('#errBox').innerHTML = '<div class="err">Not logged in. <a href="/crm-vanilla/login.html?next=' + encodeURIComponent(location.pathname) + '">Sign in to the CRM</a> to load real leads.</div>';
      return;
    }
    try {
      const r = await fetch('/api/resources/contact?limit=500', { headers: {'X-Auth-Token': TOK}, credentials: 'include' });
      if (r.status === 401) {
        localStorage.removeItem('nwm_token');
        $('#errBox').innerHTML = '<div class="err">Session expired. <a href="/crm-vanilla/login.html?next=' + encodeURIComponent(location.pathname) + '">Sign in again</a>.</div>';
        return;
      }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      CACHE = (j.items || []).map(classify);
      $('#errBox').innerHTML = '';
      $('#lastSync').textContent = 'Synced ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      render();
    } catch(e) {
      $('#errBox').innerHTML = '<div class="err">Failed to load: ' + esc(e.message) + '</div>';
    }
  }

  function render() {
    if (!CACHE) return;
    const rows = CACHE
      .filter(c => SHOW_COLD || !c.cold)
      .sort((a,b) => b.created - a.created);
    // stats
    const t0 = todayStart.getTime();
    const ms = 86400000;
    const todayCt = rows.filter(r => r.created.getTime() >= t0).length;
    const yestCt  = rows.filter(r => r.created.getTime() >= t0 - ms && r.created.getTime() < t0).length;
    const wkCt    = rows.filter(r => r.created.getTime() >= t0 - 6*ms).length;
    const monCt   = rows.filter(r => r.created.getTime() >= t0 - 29*ms).length;
    $('#stats').innerHTML = [
      ['Today',       todayCt, 'today'],
      ['Yesterday',   yestCt,  ''],
      ['Last 7 days', wkCt,    ''],
      ['Last 30 days',monCt,   ''],
      ['Total shown', rows.length, '']
    ].map(([l,v,cls]) => '<div class="stat '+cls+'"><div class="lbl">'+l+'</div><div class="val">'+v+'</div></div>').join('');
    // group by day
    if (rows.length === 0) {
      $('#feed').innerHTML = '<div class="empty">No '+(SHOW_COLD?'leads':'inbound leads')+' yet in this window. Toggle "Show cold imports" to include scraped prospects.</div>';
      return;
    }
    const groups = new Map();
    for (const r of rows) {
      const k = dayKey(r.created);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(r);
    }
    const html = Array.from(groups.entries()).map(([key, leads]) => {
      const isToday = key === dayKey(todayStart);
      const lis = leads.map(l => {
        const srcLabel = SOURCE_LABEL[l.source] || (l.source || '—');
        const name = l.name || l.email || '(no name)';
        const sub = [l.email && l.email !== name ? l.email : '', l.company].filter(Boolean).join(' · ');
        return '<div class="lead' + (l.cold?' cold':'') + '">'
          + '<div class="time">' + fmtTime(l.created) + '</div>'
          + '<div class="who">' + esc(name) + (sub ? '<small>'+esc(sub)+'</small>' : '') + '</div>'
          + '<div><span class="src">' + esc(srcLabel) + '</span></div>'
          + '<div class="niche">' + esc(l.niche) + '</div>'
          + '</div>';
      }).join('');
      return '<div class="day' + (isToday?' today':'') + '"><h2><span>' + dayLabel(key) + '</span><span class="count">' + leads.length + ' new</span></h2><div class="leads">' + lis + '</div></div>';
    }).join('');
    $('#feed').innerHTML = html;
  }

  $('#refreshBtn').addEventListener('click', fetchData);
  $('#showCold').addEventListener('change', e => { SHOW_COLD = e.target.checked; render(); });

  // initial load + 5-minute auto-refresh
  fetchData();
  setInterval(fetchData, 5 * 60 * 1000);
})();
</script>
</body>
</html>
