<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80">
  <!-- NWM Circle Badge -->
  <g transform="translate(40,40)">
    <!-- Navy outer ring -->
    <circle cx="0" cy="0" r="36" fill="#1a2d5a"/>
    <!-- White ring gap -->
    <circle cx="0" cy="0" r="33" fill="#ffffff"/>
    <!-- Orange fill -->
    <circle cx="0" cy="0" r="31" fill="#f47920"/>
    <!-- White center band -->
    <rect x="-36" y="-8.5" width="72" height="17" fill="#ffffff"/>
    <!-- NWM text -->
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="'Arial Black','Impact',sans-serif"
          font-weight="900" font-size="16" fill="#1a2d5a"
          letter-spacing="0.5">NWM</text>
    <!-- Navy outer stroke -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#1a2d5a" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="#ffffff" stroke-width="0.8"/>
  </g>

  <!-- NetWebMedia Text -->
  <text x="88" y="36" font-family="'Inter','Arial',sans-serif" font-weight="800"
        font-size="26" fill="#ffffff" letter-spacing="-0.5">
    <tspan>Net</tspan><tspan fill="#f47920">Web</tspan><tspan>Media</tspan>
  </text>

  <!-- Tagline -->
  <text x="88" y="56" font-family="'Inter','Arial',sans-serif" font-weight="500"
        font-size="10" fill="#8b8fa3" letter-spacing="2.5">
    AI MARKETING AGENCY
  </text>
</svg>
