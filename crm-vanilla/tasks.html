<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=9">
  <style>
    .tasks-toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }
    .tasks-toolbar .filter-group { display:flex; gap:6px; flex-wrap:wrap; }
    .pill { background:#f2f3f8; color:#1a1a2e; border:1px solid #e3e5ee; padding:6px 12px; border-radius:999px; font:600 12px Inter,sans-serif; cursor:pointer; }
    .pill.active { background:#010F3B; color:#fff; border-color:#010F3B; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:18px; }
    .stat-card { background:#fff; border:1px solid #e3e5ee; border-radius:10px; padding:14px; }
    .stat-card .label { color:#64677a; font:600 11px Inter; text-transform:uppercase; letter-spacing:.5px; }
    .stat-card .value { color:#010F3B; font:700 24px Inter; margin-top:4px; }
    .stat-card.alert .value { color:#FF671F; }
    .task-row { display:flex; align-items:flex-start; gap:12px; padding:14px; background:#fff; border:1px solid #e3e5ee; border-radius:10px; margin-bottom:8px; transition:.15s; }
    .task-row:hover { border-color:#FF671F; box-shadow:0 2px 8px rgba(255,103,31,.08); }
    .task-row.done { opacity:.55; }
    .task-row.done .title { text-decoration:line-through; }
    .task-check { flex:0 0 22px; height:22px; border:2px solid #c8cad6; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:2px; }
    .task-check.checked { background:#10b981; border-color:#10b981; color:#fff; }
    .task-body { flex:1; min-width:0; }
    .task-row .title { font:600 14px Inter; color:#010F3B; }
    .task-row .meta { color:#64677a; font:500 12px Inter; margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .task-row .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:6px; font-weight:600; font-size:11px; }
    .badge.priority-low      { background:#eef; color:#557; }
    .badge.priority-normal   { background:#f2f3f8; color:#1a1a2e; }
    .badge.priority-high     { background:#fef3c7; color:#92400e; }
    .badge.priority-urgent   { background:#fee2e2; color:#b91c1c; }
    .badge.type              { background:#dcfce7; color:#166534; }
    .badge.overdue           { background:#fee2e2; color:#b91c1c; }
    .task-actions { display:flex; gap:6px; }
    .task-actions .btn { padding:4px 10px; font-size:12px; }
    .empty-state { text-align:center; padding:60px 20px; color:#64677a; }
    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background:rgba(2,8,23,.55); z-index:1000; display:none; align-items:center; justify-content:center; }
    .modal-backdrop.open { display:flex; }
    .modal { background:#fff; border-radius:14px; padding:22px; width:520px; max-width:92vw; max-height:88vh; overflow:auto; box-shadow:0 20px 50px rgba(0,0,0,.25); }
    .modal h3 { margin:0 0 14px; color:#010F3B; }
    .modal label { display:block; color:#1a1a2e; font:600 12px Inter; margin:10px 0 4px; text-transform:uppercase; letter-spacing:.4px; }
    .modal input, .modal textarea, .modal select { width:100%; padding:9px 10px; border:1px solid #e3e5ee; border-radius:8px; font:400 14px Inter; }
    .modal textarea { min-height:80px; resize:vertical; }
    .modal .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V71R6PD7C0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-V71R6PD7C0', { anonymize_ip: true });
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body">
        <div class="stat-grid" id="taskStats"></div>
        <div class="tasks-toolbar">
          <div class="filter-group" id="dueFilter">
            <button class="pill active" data-due="">All</button>
            <button class="pill" data-due="overdue">Overdue</button>
            <button class="pill" data-due="today">Today</button>
            <button class="pill" data-due="week">This Week</button>
          </div>
          <div class="filter-group" id="statusFilter">
            <button class="pill active" data-status="">Any status</button>
            <button class="pill" data-status="open">Open</button>
            <button class="pill" data-status="in_progress">In Progress</button>
            <button class="pill" data-status="done">Done</button>
          </div>
          <div style="margin-left:auto; display:flex; gap:8px;">
            <input id="taskSearch" placeholder="Search tasks…" style="padding:7px 12px; border:1px solid #e3e5ee; border-radius:8px; font:500 13px Inter; width:220px;">
            <button class="btn btn-primary" id="newTaskBtn">+ New Task</button>
          </div>
        </div>
        <div id="taskList"></div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="taskModal">
    <div class="modal">
      <h3 id="modalTitle">New Task</h3>
      <input type="hidden" id="taskId">
      <label>Title</label>
      <input id="taskTitle" placeholder="Follow up with Acme Corp">
      <label>Description</label>
      <textarea id="taskDescription" placeholder="Optional context…"></textarea>
      <div class="row">
        <div>
          <label>Type</label>
          <select id="taskType">
            <option value="todo">To-do</option>
            <option value="call">Call</option>
            <option value="email">Email</option>
            <option value="meeting">Meeting</option>
            <option value="follow_up">Follow-up</option>
            <option value="demo">Demo</option>
            <option value="proposal">Proposal</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select id="taskPriority">
            <option value="low">Low</option>
            <option value="normal" selected>Normal</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Due date</label>
          <input type="datetime-local" id="taskDue">
        </div>
        <div>
          <label>Status</label>
          <select id="taskStatus">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Contact ID</label>
          <input id="taskContactId" type="number" placeholder="optional">
        </div>
        <div>
          <label>Deal ID</label>
          <input id="taskDealId" type="number" placeholder="optional">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="taskCancel">Cancel</button>
        <button class="btn btn-danger"   id="taskDelete" style="display:none;">Delete</button>
        <button class="btn btn-primary"  id="taskSave">Save</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js?v=9"></script>
  <script src="js/tasks.js?v=1"></script>
  <script src="assets/nwm-i18n.js" defer></script>
</body>
</html>
