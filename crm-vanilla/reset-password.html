<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña - NetWeb CRM</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=12">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-gradient-line"></div>
    <div class="login-header">
      <div class="login-brand">
        <div class="brand-icon">N</div>
        <span class="login-brand-text">NetWeb CRM</span>
      </div>
      <h1 class="login-title">Restablecer contraseña</h1>
      <p class="login-subtitle">Elige una nueva contraseña para tu cuenta · Choose a new password</p>
    </div>

    <form id="resetForm" class="login-form">
      <div id="resetError" class="login-error"></div>
      <div class="login-field">
        <label class="login-label" for="newPassword">Nueva contraseña · New password</label>
        <input type="password" id="newPassword" class="login-input" placeholder="Mínimo 8 caracteres" minlength="8" required autocomplete="new-password">
      </div>
      <div class="login-field">
        <label class="login-label" for="confirmPassword">Confirmar contraseña · Confirm password</label>
        <input type="password" id="confirmPassword" class="login-input" placeholder="Repite la contraseña" minlength="8" required autocomplete="new-password">
      </div>
      <button type="submit" id="resetBtn" class="login-btn">Guardar contraseña · Save</button>
    </form>

    <div class="login-footer">
      <p class="login-forgot"><a href="login.html">Volver a iniciar sesión · Back to sign in</a></p>
    </div>
  </div>
  <script src="js/reset-password.js?v=1"></script>
</body>
</html>
