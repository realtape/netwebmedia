name: billing-integration-test

# Nightly + PR integration test of the Mercado Pago billing chain.
#
# Catches the three regressions surfaced on 2026-05-11:
#   1. Missing promo_code columns on subscriptions table → 500 on checkout
#      (fixed in 8d454cea3)
#   2. cmo_standard plan code mismatch → 400 "Unknown plan"
#      (fixed in 7611959c9 + auto-saves)
#   3. cancel / my-subscription scoping by org_id only → cross-tenant escalation
#      (fixed in 3da64f69b)
#
# Test target: production (https://netwebmedia.com) by default. Set the ORIGIN
# repo variable to override for staging (when staging exists).
#
# Required GitHub Secrets:
#   NIGHTLY_TEST_EMAIL     — persistent test user (e.g. nightly-integration-test@netwebmedia.com)
#   NIGHTLY_TEST_PASSWORD  — its password (kept in sync with the real user row)
#
# First run will register the user via /api/auth/register if the email doesn't
# exist yet. Subsequent runs just login. The script cleans up all created
# subscriptions at end so the test user accumulates zero state.

on:
  # Nightly at 04:00 UTC = 00:00 Chile (Carlos's tz), 21:00 PT
  # Avoids the */5 cron-workflows.yml heartbeat congestion.
  schedule:
    - cron: '0 4 * * *'

  # Re-run on any PR touching the billing chain — pricing UI, API routes, or
  # the test itself. Catches regressions before they hit main.
  pull_request:
    paths:
      - 'api-php/routes/billing.php'
      - 'api-php/routes/auth.php'
      - 'api-php/lib/auth.php'
      - 'pricing.html'
      - 'assets/billing-plans-fallback.json'
      - 'tests/integration/billing-flow.test.js'
      - '.github/workflows/billing-integration-test.yml'

  # Manual fire — useful for verifying a fix immediately after deploy.
  workflow_dispatch:
    inputs:
      origin:
        description: 'Origin to test against (default: production)'
        default: 'https://netwebmedia.com'
        required: false

# Only one nightly + only one PR run per ref at a time. Cancel in-progress
# runs when a new commit lands — the latest commit is what matters.
concurrency:
  group: billing-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run billing integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run integration tests
        env:
          ORIGIN: ${{ inputs.origin || 'https://netwebmedia.com' }}
          NIGHTLY_TEST_EMAIL: ${{ secrets.NIGHTLY_TEST_EMAIL }}
          NIGHTLY_TEST_PASSWORD: ${{ secrets.NIGHTLY_TEST_PASSWORD }}
        run: |
          # Hard-fail if secrets aren't configured — better than silently
          # falling back to defaults that won't auth.
          if [ -z "$NIGHTLY_TEST_EMAIL" ] || [ -z "$NIGHTLY_TEST_PASSWORD" ]; then
            echo "::error::NIGHTLY_TEST_EMAIL and NIGHTLY_TEST_PASSWORD must be set as repo secrets"
            echo "  → Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          echo "Running against: $ORIGIN"
          echo "Test user: $NIGHTLY_TEST_EMAIL"
          node --test --test-reporter=spec tests/integration/billing-flow.test.js

      - name: Report failure to Slack (on schedule failures only)
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_OPS_WEBHOOK }}
        run: |
          # Only ping Slack on scheduled run failures — PR failures show in
          # the PR UI already. Soft-fail if SLACK_OPS_WEBHOOK isn't set.
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "::warning::SLACK_OPS_WEBHOOK not set — skipping Slack notification"
            exit 0
          fi
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 *Billing integration test FAILED* on schedule\\n_Run:_ ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n_Likely impact:_ a recent commit broke the Mercado Pago checkout chain. Check the run log for which assertion failed.\"}" \
            "$SLACK_WEBHOOK" || echo "::warning::Slack notification failed (non-blocking)"
