name: Generate Guide PDFs

# Runs after the blog publisher commits new guides, or manually.
# Converts /guides/*.html to /assets/guides/*.pdf using Puppeteer.

on:
  push:
    paths:
      - 'guides/**'
      - 'lp/**'
      - 'css/guide.css'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Specific guide slug to re-generate (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm install puppeteer
          # Install Chromium system deps
          npx puppeteer browsers install chrome

      - name: Generate PDFs from guide HTMLs
        run: |
          mkdir -p assets/guides
          node - <<'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = require('path');

          const slug = process.env.GUIDE_SLUG || '';
          const guidesDir = 'guides';
          const outDir = 'assets/guides';

          async function generatePDF(htmlFile, pdfFile) {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox'],
              headless: true
            });
            try {
              const page = await browser.newPage();
              const absolutePath = path.resolve(htmlFile);
              await page.goto('file://' + absolutePath, { waitUntil: 'networkidle0', timeout: 30000 });
              await page.evaluateHandle('document.fonts.ready');
              await page.pdf({
                path: pdfFile,
                format: 'Letter',
                printBackground: true,
                margin: { top: 0, right: 0, bottom: 0, left: 0 }
              });
              console.log('✓', pdfFile);
            } finally {
              await browser.close();
            }
          }

          async function main() {
            const files = fs.readdirSync(guidesDir)
              .filter(f => f.endsWith('.html'))
              .filter(f => !slug || f === slug + '.html');

            for (const f of files) {
              const htmlPath = path.join(guidesDir, f);
              const pdfPath  = path.join(outDir, f.replace('.html', '.pdf'));
              try {
                await generatePDF(htmlPath, pdfPath);
              } catch (err) {
                console.error('✗', f, err.message);
              }
            }
            console.log('Done.');
          }

          main();
          EOF
        env:
          GUIDE_SLUG: ${{ github.event.inputs.slug }}

      - name: Check for new PDFs
        id: check
        run: |
          COUNT=$(git status --porcelain assets/guides/ | wc -l)
          echo "changed=$COUNT" >> "$GITHUB_OUTPUT"
          echo "PDF files changed: $COUNT"

      - name: Commit and push PDFs
        if: steps.check.outputs.changed != '0'
        run: |
          git config user.name "NWM Guide Bot"
          git config user.email "bot@netwebmedia.com"
          git add assets/guides/
          git commit -m "guides: regenerate PDFs $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
