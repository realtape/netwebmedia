<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <title>NetWebMedia carousel slide B-4 (what you get)</title>
  <desc>Instagram carousel slide. 1080x1080. Navy #010F3B background, Orange #FF671F accent. Brand: NetWebMedia.</desc>
  <defs>
    <radialGradient id="bgGlowb4" cx="20%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#02206b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#02206b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2_b4" cx="80%" cy="85%" r="60%">
      <stop offset="0%" stop-color="#0d1f5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1f5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orangeRuleb4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF671F"/>
      <stop offset="100%" stop-color="#ff8c4a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1080" height="1080" fill="#010F3B"/>
  <rect width="1080" height="1080" fill="url(#bgGlowb4)"/>
  <rect width="1080" height="1080" fill="url(#bgGlow2_b4)"/>

  <!-- Top brand bar -->
  <rect x="60" y="60" width="64" height="6" fill="url(#orangeRuleb4)"/>
  <text x="140" y="80" font-family="'Poppins','Inter',system-ui,-apple-system,sans-serif" font-weight="800" font-size="22" fill="#fff" letter-spacing="0.5">NetWebMedia</text>

  <!-- Slide counter -->
  <text x="1020" y="80" text-anchor="end" font-family="'Inter',system-ui,sans-serif" font-weight="600" font-size="18" fill="#8892b0">4/5</text>

  <!-- Eyebrow -->
  <text x="60" y="430" font-family="'Inter',system-ui,sans-serif" font-weight="700" font-size="22" fill="#FF671F" letter-spacing="6">WHAT YOU GET</text>

  <!-- Headline -->
  <text x="60" y="540" font-family="'Poppins','Inter',system-ui,sans-serif" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-2">Direct line to</text>
  <text x="60" y="650" font-family="'Poppins','Inter',system-ui,sans-serif" font-weight="800" font-size="92" fill="#ffffff" letter-spacing="-2">the founder.</text>

  <!-- Body -->
  <text font-family="'Inter',system-ui,sans-serif" font-weight="400" font-size="32" fill="#c8d3e8">
    <tspan x="60" y="800">Every client works with me from</tspan>
    <tspan x="60" y="848">first call to last invoice.</tspan>
    <tspan x="60" y="896">Bilingual EN/ES. WhatsApp business hours.</tspan>
  </text>

  <!-- Footer -->
  <line x1="60" y1="990" x2="1020" y2="990" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="60" y="1030" font-family="'Inter',system-ui,sans-serif" font-weight="700" font-size="22" fill="#FF671F">netwebmedia.com</text>
  <text x="1020" y="1030" text-anchor="end" font-family="'Inter',system-ui,sans-serif" font-weight="500" font-size="20" fill="#8892b0">@netwebmedia</text>
</svg>
