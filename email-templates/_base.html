<!DOCTYPE html>
<html lang="{{lang|en}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-apple-disable-message-reformatting">
<title>{{subject}}</title>
<style>
  body { margin:0; padding:0; background:#f4f5f9; font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#1a1a2e; line-height:1.55; }
  .wrap { width:100%; background:#f4f5f9; padding:32px 0; }
  .container { max-width:560px; margin:0 auto; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 6px 24px rgba(0,0,0,.06); }
  .header { padding:24px 28px; background:linear-gradient(135deg,#FF6B00,#ff3d00); color:#fff; text-align:left; }
  .header img { height:32px; }
  .body { padding:28px; font-size:15px; color:#1a1a2e; }
  .body p { margin:0 0 16px; line-height:1.65; }
  .body h2 { font-size:20px; margin:0 0 12px; color:#0a0e27; }
  .body h3 { font-size:16px; margin:18px 0 8px; color:#0a0e27; }
  .body ul { margin:0 0 16px; padding-left:18px; }
  .body li { margin-bottom:6px; }
  .body a { color:#FF6B00; }
  .btn-primary { display:inline-block; background:linear-gradient(135deg,#FF6B00,#ff3d00); color:#fff !important; padding:14px 28px; border-radius:10px; text-decoration:none; font-weight:700; font-size:15px; margin:8px 0; }
  .btn-secondary { display:inline-block; background:#f0f1f5; color:#1a1a2e !important; padding:12px 22px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; margin:8px 8px 8px 0; }
  .divider { border-top:1px solid #e5e7eb; margin:22px 0; }
  .signature { color:#5b5f7a; font-size:14px; line-height:1.6; }
  .signature .name { color:#1a1a2e; font-weight:700; }
  .footer { padding:24px 28px; background:#f4f5f9; color:#6b7280; font-size:12px; text-align:center; line-height:1.6; }
  .footer a { color:#6b7280; text-decoration:underline; }
  @media (max-width:600px) { .container{margin:0 8px} .body{padding:22px} .header{padding:20px 22px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="container">
    <div class="header">
      <strong style="font-size:18px;">NetWebMedia</strong>
      <span style="opacity:.85;font-size:13px;margin-left:8px;">AI Marketing Agency</span>
    </div>
    <div class="body">
      {{CONTENT}}
    </div>
    <div class="footer">
      NetWebMedia · Remote-first · Serving US &amp; Chile<br>
      <a href="https://netwebmedia.com">netwebmedia.com</a> ·
      <a href="mailto:hello@netwebmedia.com">hello@netwebmedia.com</a> ·
<br>
      You're receiving this because you subscribed at netwebmedia.com.<br>
      <a href="{{preference_url}}">Manage preferences</a> ·
      <a href="{{unsubscribe_url}}">Unsubscribe</a>
    </div>
  </div>
</div>
</body>
</html>
