name: Cron — USA Cold Outreach (wave 2 — every 1 min)
# Wave 2: cap raised to 61000 to cover full 60,818-contact universe.
# Wave 1 (30,000) complete 2026-05-01. Wave 2 started 2026-05-01.
on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche key filter (optional, e.g. financial_services, health)'
        required: false
        default: ''
      batch:
        description: 'Max sends per call (default 3000, hard-capped at 3000)'
        required: false
        default: '3000'

      mode:
        description: 'Send mode (batch | status | test)'
        required: false
        default: 'batch'

concurrency:
  group: usa-cold-outreach
  cancel-in-progress: false

jobs:
  usa-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Send next batch
        run: |
          NICHE="${{ github.event.inputs.niche }}"
          BATCH="${{ github.event.inputs.batch || '3000' }}"

          MODE="${{ github.event.inputs.mode || 'batch' }}"
          # Token is embedded in api-php/usa-send.php; using GH secret if set,
          # otherwise fall back to the embedded value.
          TOKEN="${{ secrets.USA_SEND_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="NWM_USA_SEND_2026_d3f7e2c9a1b48560"
          fi
          # Token now sent via X-Auth-Token HEADER (not querystring) so it's
          # not logged in InMotion access logs / referrers / browser history.
          URL="https://netwebmedia.com/api/usa-send?mode=${MODE}&n=${BATCH}&cap_total=61000"
          if [ -n "$NICHE" ]; then
            URL="${URL}&niche=${NICHE}"
          fi
          # Full Chrome UA + Origin + Referer to bypass mod_security on InMotion.
          curl -s "$URL" \
            -H "X-Auth-Token: ${TOKEN}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Origin: https://netwebmedia.com" \
            -H "Referer: https://netwebmedia.com/crm-vanilla/" \
            -w "\nHTTP Status: %{http_code}\n"
