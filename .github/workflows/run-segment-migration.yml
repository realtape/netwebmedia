name: Run segment migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Add segment column + backfill
        run: |
          RESP=$(curl -s --max-time 90             -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"             "https://app.netwebmedia.com/add_segment.php?token=nwm-seg-2026")
          echo "$RESP"
          echo "$RESP" | grep -q "Done." && echo "SUCCESS" || { echo "FAILED"; exit 1; }
