<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800;900&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
      .clip { position: absolute; top: 0; left: 0; }
      .broll { position: absolute; top:0; left:0; width: 1080px; height: 1920px; object-fit: cover; }
      .broll-tint-top { position: absolute; top:0; left:0; width: 1080px; height: 1920px; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.45) 22%, rgba(0,0,0,0.0) 38%); }
      .broll-tint-bottom { position: absolute; top:0; left:0; width: 1080px; height: 1920px; background: linear-gradient(180deg, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.0) 35%, rgba(0,0,0,0.55) 65%, rgba(0,0,0,0.85) 100%); }
      .handle { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #fff; font-weight: 800; font-size: 32px; letter-spacing: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.7); opacity: 0.95; }
      .handle .at { color: #FF1A1A; }
      .chapter { position: absolute; top: 175px; left: 60px; background: #FF1A1A; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; padding: 10px 20px; opacity: 0; }
      #hook { position: absolute; top: 250px; left: 60px; width: 960px; opacity: 0; }
      #hook-headline { color: #fff; font-size: 108px; font-weight: 900; line-height: 0.96; text-transform: uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.92); letter-spacing: -1px; }
      #hook-headline .accent { color: #FF1A1A; }
      #hud { position: absolute; top: 740px; left: 60px; width: 540px; opacity: 0; background: rgba(0,0,0,0.72); border-left: 6px solid #FF1A1A; padding: 26px 32px; backdrop-filter: blur(8px); }
      #hud-label { color: #FF1A1A; font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
      #hud-val { color: #fff; font-size: 84px; font-weight: 900; line-height: 1; }
      #hud-sub { color: rgba(255,255,255,0.85); font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 400; margin-top: 8px; }
      #build { position: absolute; top: 1100px; left: 60px; width: 960px; opacity: 0; }
      #build-text { color: #fff; font-family: 'Inter', sans-serif; font-size: 44px; font-weight: 700; line-height: 1.18; text-shadow: 0 2px 12px rgba(0,0,0,0.92); }
      #build-text .accent { color: #FF1A1A; }
      #cta { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: 960px; text-align: center; opacity: 0; }
      #cta-line1 { color: #fff; font-size: 36px; font-weight: 800; line-height: 1.1; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.9); margin-bottom: 14px; }
      #cta-handle { display: inline-block; background: #FF1A1A; color: #fff; font-size: 38px; font-weight: 800; padding: 18px 38px; border-radius: 60px; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 8px 28px rgba(255,26,26,0.45); }
      #progress { position: absolute; bottom: 0; left: 0; width: 0; height: 8px; background: #FF1A1A; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="r40" data-start="0" data-duration="20" data-width="1080" data-height="1920">
      <video id="broll" class="broll clip" muted autoplay loop src="assets/broll/clip-R40.mp4" data-start="0" data-duration="20" data-track-index="0"></video>
      <div class="broll-tint-top clip" data-start="0" data-duration="20" data-track-index="1"></div>
      <div class="broll-tint-bottom clip" data-start="0" data-duration="20" data-track-index="2"></div>
      <div class="handle clip" data-start="0" data-duration="20" data-track-index="3"><span class="at">@</span>REALTAPE</div>
      <div class="chapter clip" id="chapter" data-start="0" data-duration="5" data-track-index="4">// THE LINE</div>
      <div id="hook" class="clip" data-start="0" data-duration="5" data-track-index="5">
        <div id="hook-headline">TO THE<br><span class="accent">FLAG.</span></div>
      </div>
      <div id="hud" class="clip" data-start="5" data-duration="6" data-track-index="6">
        <div id="hud-label">FINISH</div>
        <div id="hud-val">P-?</div>
        <div id="hud-sub">16 minutes of focus</div>
      </div>
      <div id="build" class="clip" data-start="11" data-duration="6" data-track-index="7">
        <div id="build-text">IMSA Multiclass.<br>Short race. <span class="accent">Long memory.</span></div>
      </div>
      <div id="cta" class="clip" data-start="16" data-duration="4" data-track-index="8">
        <div id="cta-line1">FULL RACE ON THE CHANNEL</div>
        <div id="cta-handle">@REALTAPE</div>
      </div>
      <div id="progress" class="clip" data-start="0" data-duration="20" data-track-index="98"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#chapter", { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, 0.1)
        .to("#chapter", { opacity: 0, x: -20, duration: 0.3, ease: "power2.in" }, 4.7);
      tl.fromTo("#hook", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.25)
        .to("#hook", { opacity: 0, y: -25, duration: 0.4, ease: "power2.in" }, 4.55);
      tl.fromTo("#hud", { opacity: 0, x: -50 }, { opacity: 1, x: 0, duration: 0.45, ease: "power3.out" }, 5.1)
        .to("#hud", { opacity: 0, x: -25, duration: 0.35, ease: "power2.in" }, 10.55);
      tl.fromTo("#build", { opacity: 0, y: 25 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, 11.1)
        .to("#build", { opacity: 0, y: -20, duration: 0.35, ease: "power2.in" }, 16.55);
      tl.fromTo("#cta", { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 16.1);
      tl.fromTo("#progress", { width: 0 }, { width: 1080, duration: 20, ease: "none" }, 0);
      window.__timelines["r40"] = tl;
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
