name: Rotate admin tokens (MIGRATE/SEED/DEDUPE/IMPORT)

# Auto-rotates the 5 admin tokens used by crm-vanilla/api/handlers/migrate.php,
# seed.php, dedupe.php, import_csv.php, import_best.php.
#
# How it works:
#   1. Generates fresh 32-char random hex tokens (256 bits of entropy each)
#   2. Updates the corresponding GitHub repo secrets via `gh secret set`
#   3. Triggers deploy-site-root.yml — which writes the new tokens into
#      crm-vanilla/api/config.local.php on the InMotion server
#   4. Probes the migrate endpoint with the new MIGRATE_TOKEN to confirm
#      the rotation propagated (smoke test only — doesn't actually migrate)
#   5. Writes an audit-trail commit to plans/audits/secret-rotations.md
#      (rotation date + workflow run ID — never the token values themselves)
#
# Triggers:
#   - workflow_dispatch (Carlos clicks "Run workflow" in GH Actions UI)
#   - schedule: 1st of every month at 09:00 UTC (auto-rotate)
#
# REQUIRED ONE-TIME SETUP (5 minutes, MUST be done in browser):
#   1. Open https://github.com/settings/personal-access-tokens/new
#      (use the "Fine-grained" tab, NOT "Tokens classic" — better security)
#   2. Token name: "NWM secrets rotation"
#   3. Resource owner: realtape (or your GH username)
#   4. Repository access: "Only select repositories" → netwebmedia/netwebmedia
#   5. Repository permissions:
#        - Actions: Read and write
#        - Contents: Read and write
#        - Secrets: Read and write
#        - Workflows: Read and write
#   6. Expiration: 1 year (set a calendar reminder to rotate this PAT itself)
#   7. Click "Generate token", copy the value (starts with `github_pat_`)
#   8. From your terminal:
#        gh secret set GH_PAT_SECRETS_ROTATION \
#          --repo netwebmedia/netwebmedia --body "github_pat_xxxxxxxxxxxxxxx"
#
#   Why a PAT and not GITHUB_TOKEN: the default GITHUB_TOKEN cannot write
#   repository secrets (only read). PAT is the documented escape hatch.
#
#   Why NOT the `gh auth token` value: that's an OAuth Device Flow token
#   (prefix `gho_`), only valid when the gh CLI itself makes calls. It will
#   401 from a workflow runner. You MUST create a real PAT.
#
# Manual trigger from CLI:
#   gh workflow run rotate-secrets.yml
#
# To rotate ONLY a subset, use the `services` input:
#   gh workflow run rotate-secrets.yml -f services=migrate,seed

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated tokens to rotate (or 'all')"
        required: false
        default: "all"
      skip_deploy:
        description: "Skip deploy trigger (rotate secrets only, deploy later)"
        required: false
        default: "false"
  schedule:
    # 1st of each month at 09:00 UTC — coincides with Carlos's monthly review
    - cron: "0 9 1 * *"

permissions:
  contents: write   # to commit the audit-trail changelog
  actions: write    # to trigger the deploy workflow

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Generate fresh random tokens
        id: gen
        run: |
          set -euo pipefail
          # Each token: 32 hex chars = 128 bits of entropy. Sufficient for admin tokens.
          # Format: NWM_<PURPOSE>_<random> so rotation history is greppable in logs
          # without leaking the actual secret value.
          MIGRATE_TOKEN="NWM_MIGRATE_$(openssl rand -hex 16)"
          SEED_TOKEN="NWM_SEED_$(openssl rand -hex 16)"
          DEDUPE_TOKEN="NWM_DEDUPE_$(openssl rand -hex 16)"
          IMPORT_BEST_TOKEN="NWM_IMPORT_BEST_$(openssl rand -hex 16)"
          IMPORT_CSV_TOKEN="NWM_IMPORT_CSV_$(openssl rand -hex 16)"

          # Mask values so they don't appear in logs even if a later step prints them
          echo "::add-mask::$MIGRATE_TOKEN"
          echo "::add-mask::$SEED_TOKEN"
          echo "::add-mask::$DEDUPE_TOKEN"
          echo "::add-mask::$IMPORT_BEST_TOKEN"
          echo "::add-mask::$IMPORT_CSV_TOKEN"

          # Pass to next steps via env (still masked)
          {
            echo "MIGRATE_TOKEN=$MIGRATE_TOKEN"
            echo "SEED_TOKEN=$SEED_TOKEN"
            echo "DEDUPE_TOKEN=$DEDUPE_TOKEN"
            echo "IMPORT_BEST_TOKEN=$IMPORT_BEST_TOKEN"
            echo "IMPORT_CSV_TOKEN=$IMPORT_CSV_TOKEN"
          } >> "$GITHUB_OUTPUT"

          echo "Generated 5 fresh tokens (32 hex chars each, masked from logs)"

      - name: Update GitHub repo secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_ROTATION }}
          SERVICES: ${{ github.event.inputs.services || 'all' }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_PAT_SECRETS_ROTATION secret is not set."
            echo ""
            echo "ONE-TIME SETUP (5 min, see workflow file header for full steps):"
            echo "  1. Browser: https://github.com/settings/personal-access-tokens/new"
            echo "  2. Fine-grained PAT scoped to netwebmedia/netwebmedia"
            echo "  3. Permissions: Actions/Contents/Secrets/Workflows = Read and write"
            echo "  4. Run: gh secret set GH_PAT_SECRETS_ROTATION --repo \\"
            echo "         netwebmedia/netwebmedia --body 'github_pat_xxx'"
            exit 1
          fi
          # Detect the wrong token TYPE early — gho_/ghs_ tokens 401 from runners
          if [[ "${GH_TOKEN}" == gho_* ]]; then
            echo "::error::GH_PAT_SECRETS_ROTATION holds an OAuth token (gho_), not a PAT."
            echo "OAuth Device Flow tokens are scoped to the gh CLI and 401 from runners."
            echo "Replace it with a real PAT — see workflow header for instructions."
            exit 1
          fi

          rotate_one() {
            local name="$1"; local value="$2"
            echo "Rotating $name…"
            echo -n "$value" | gh secret set "$name" --repo "${{ github.repository }}" --body -
          }

          # Determine which to rotate
          if [ "$SERVICES" = "all" ]; then
            ROTATE="migrate seed dedupe import_best import_csv"
          else
            ROTATE=$(echo "$SERVICES" | tr ',' ' ')
          fi

          for svc in $ROTATE; do
            case "$svc" in
              migrate)     rotate_one MIGRATE_TOKEN     "${{ steps.gen.outputs.MIGRATE_TOKEN }}" ;;
              seed)        rotate_one SEED_TOKEN        "${{ steps.gen.outputs.SEED_TOKEN }}" ;;
              dedupe)      rotate_one DEDUPE_TOKEN      "${{ steps.gen.outputs.DEDUPE_TOKEN }}" ;;
              import_best) rotate_one IMPORT_BEST_TOKEN "${{ steps.gen.outputs.IMPORT_BEST_TOKEN }}" ;;
              import_csv)  rotate_one IMPORT_CSV_TOKEN  "${{ steps.gen.outputs.IMPORT_CSV_TOKEN }}" ;;
              *) echo "::warning::Unknown service: $svc (skipping)" ;;
            esac
          done

          echo "Repo secrets updated."

      - name: Trigger deploy-site-root.yml so server config.local.php picks up new tokens
        id: deploy
        if: ${{ github.event.inputs.skip_deploy != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_ROTATION }}
        run: |
          set -euo pipefail
          # Write tracker file (audit trail of when rotations propagate to prod).
          # Note: we no longer rely on path filters to trigger the deploy — we
          # explicitly dispatch deploy-site-root.yml below so the deploy ALWAYS runs
          # regardless of which paths changed.
          mkdir -p .rotation
          date -u +"%Y-%m-%dT%H:%M:%SZ — auto-rotate via run ${{ github.run_id }}" > .rotation/last-rotation.txt
          git config user.name "rotate-secrets-bot"
          git config user.email "rotate-secrets-bot@noreply.netwebmedia.com"
          git add .rotation/last-rotation.txt
          git commit -m "chore(security): auto-rotate admin tokens — run ${{ github.run_id }}"
          # Retry push with rebase to handle concurrent commits from auto-save daemon
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push origin HEAD:main; then
              echo "Tracker pushed on attempt $attempt"
              break
            fi
            echo "Push attempt $attempt rejected — retrying after $((attempt * 5))s"
            sleep $((attempt * 5))
          done

          # Explicitly dispatch deploy-site-root.yml — don't rely on path filters.
          echo "Dispatching deploy-site-root.yml…"
          gh workflow run deploy-site-root.yml --ref main
          # Capture the run ID we just kicked off (most recent dispatch on main).
          sleep 5
          DEPLOY_RUN_ID=$(gh run list --workflow=deploy-site-root.yml --branch=main --limit=1 --json databaseId --jq '.[0].databaseId')
          echo "deploy_run_id=$DEPLOY_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy run dispatched: $DEPLOY_RUN_ID"

      - name: Wait for deploy to finish, then probe migrate endpoint
        if: ${{ github.event.inputs.skip_deploy != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_ROTATION }}
          NEW_TOKEN: ${{ steps.gen.outputs.MIGRATE_TOKEN }}
          DEPLOY_RUN_ID: ${{ steps.deploy.outputs.deploy_run_id }}
        run: |
          set -euo pipefail

          # Poll for deploy completion (up to 10 minutes). InMotion FTP can be slow
          # and occasionally drops the connection — gh run watch retries internally.
          if [ -n "${DEPLOY_RUN_ID:-}" ]; then
            echo "Watching deploy run $DEPLOY_RUN_ID…"
            gh run watch "$DEPLOY_RUN_ID" --exit-status --interval 15 || {
              echo "::warning::Deploy run did not complete cleanly. Probing anyway in case partial deploy succeeded."
            }
          else
            echo "::warning::No deploy run ID captured — falling back to fixed 120s wait."
            sleep 120
          fi

          # Allow extra propagation time for cPanel cache + Apache mtime detection.
          echo "Waiting 30s for config.local.php propagation…"
          sleep 30

          # Probe with retries — the InMotion FTP server occasionally drops
          # connections mid-deploy (we've seen "Server sent FIN packet" errors),
          # which means a single probe is not authoritative.
          PROBE_OK=""
          for attempt in 1 2 3 4 5; do
            response=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Origin: https://netwebmedia.com" \
              -H "User-Agent: rotate-secrets-bot/1.0" \
              -d '{}' \
              "https://netwebmedia.com/crm-vanilla/api/?r=migrate&token=${NEW_TOKEN}&schema=organizations" \
              || echo '{"error":"curl failed"}')

            echo "Probe attempt $attempt response (token redacted):"
            echo "$response" | sed "s|${NEW_TOKEN}|<NEW_MIGRATE_TOKEN>|g" || true

            if echo "$response" | grep -q '"errors":\[\]'; then
              PROBE_OK="1"
              echo "::notice::Rotation verified on attempt $attempt — new MIGRATE_TOKEN works against production."
              break
            fi

            if echo "$response" | grep -q '"error":"Invalid token"'; then
              echo "Token not yet propagated (attempt $attempt). Waiting 30s…"
              sleep 30
              continue
            fi

            echo "Unexpected response shape on attempt $attempt — retrying after 15s"
            sleep 15
          done

          if [ -z "$PROBE_OK" ]; then
            echo "::error::Rotation completed but server never picked up the new token after 5 attempts."
            echo "Possible causes:"
            echo "  - deploy-site-root.yml failed (check the dispatched run)"
            echo "  - InMotion FTP timeout left config.local.php in mixed state"
            echo "  - cPanel opcache holding old config"
            echo "Manually verify: gh run view $DEPLOY_RUN_ID"
            exit 1
          fi

      - name: Append audit-trail entry
        run: |
          set -euo pipefail
          mkdir -p plans/audits
          file="plans/audits/secret-rotations.md"
          if [ ! -f "$file" ]; then
            cat > "$file" <<'HEADER'
          # Admin Token Rotation Log

          Auto-generated by `.github/workflows/rotate-secrets.yml`.
          Each entry records a rotation event. **Token values are never recorded** —
          only metadata (date, services rotated, GH Actions run ID).

          | Date (UTC) | Services rotated | Workflow run | Trigger |
          |---|---|---|---|
          HEADER
          fi

          rotated="${{ github.event.inputs.services || 'all' }}"
          trigger="${{ github.event_name }}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "| $(date -u +%Y-%m-%dT%H:%M:%SZ) | ${rotated} | [#${{ github.run_id }}](${run_url}) | ${trigger} |" >> "$file"

          git config user.name "rotate-secrets-bot"
          git config user.email "rotate-secrets-bot@noreply.netwebmedia.com"
          git add "$file"
          git diff --staged --quiet || git commit -m "audit: secret rotation $(date -u +%Y-%m-%d) — run ${{ github.run_id }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD || true

      - name: Summary
        run: |
          {
            echo "## Token rotation complete"
            echo ""
            echo "- **Services rotated:** ${{ github.event.inputs.services || 'all (5 tokens)' }}"
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Run ID:** ${{ github.run_id }}"
            echo "- **Skip deploy:** ${{ github.event.inputs.skip_deploy || 'false' }}"
            echo ""
            echo "Token values are masked from this log. They live in:"
            echo "1. Repo secrets (\`gh secret list\`)"
            echo "2. \`/home/webmed6/public_html/crm-vanilla/api/config.local.php\` on InMotion (after deploy)"
            echo ""
            echo "Audit trail: \`plans/audits/secret-rotations.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
