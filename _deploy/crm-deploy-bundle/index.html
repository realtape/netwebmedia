<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="dashboard-grid">
          <div class="dashboard-col">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Revenue Overview</h2>
                <span class="stat-change positive">+24% vs last quarter</span>
              </div>
              <div id="revenueChart"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Active Deals</h2>
                <a href="pipeline.html" class="btn btn-secondary btn-sm">View All</a>
              </div>
              <div id="activeDeals"></div>
            </div>
          </div>
          <div class="dashboard-col">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Today's Schedule</h2>
              </div>
              <div id="todaySchedule"></div>
            </div>
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">Recent Contacts</h2>
                <a href="contacts.html" class="btn btn-secondary btn-sm">View All</a>
              </div>
              <div id="recentContacts"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
