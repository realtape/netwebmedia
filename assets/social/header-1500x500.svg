<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <title>NetWebMedia social header — FB/YT/X banner format</title>
  <desc>Brand banner 1500x500. Navy gradient bg, sky-blue + orange wordmark, headline + tagline. Safe-area centered for FB/YT/LinkedIn crops. 2026-05-12 refresh.</desc>
  <defs>
    <radialGradient id="bgGlow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#02206b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#02206b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="85%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#0d1f5c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0d1f5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orangeRule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF671F"/>
      <stop offset="100%" stop-color="#ff8c4a"/>
    </linearGradient>
  </defs>

  <!-- Navy base + atmospheric glows -->
  <rect width="1500" height="500" fill="#010F3B"/>
  <rect width="1500" height="500" fill="url(#bgGlow1)"/>
  <rect width="1500" height="500" fill="url(#bgGlow2)"/>

  <!-- Lowercase wordmark, safe-area centered, top third -->
  <text x="750" y="180" text-anchor="middle"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="86" letter-spacing="-4">
    <tspan fill="#5DB4E5">net</tspan><tspan fill="#FF671F">web</tspan><tspan fill="#5DB4E5">media</tspan>
  </text>

  <!-- Orange accent rule under the wordmark -->
  <rect x="710" y="210" width="80" height="4" fill="url(#orangeRule)"/>

  <!-- Headline — primary value prop -->
  <text x="750" y="285" text-anchor="middle"
        font-family="'Poppins','Inter',sans-serif"
        font-weight="800" font-size="46" fill="#eaf0ff" letter-spacing="-1">
    AI-native fractional CMO.
  </text>

  <!-- Tagline — what we do -->
  <text x="750" y="335" text-anchor="middle"
        font-family="'Inter',sans-serif"
        font-weight="500" font-size="24" fill="#8892b0" letter-spacing="0.5">
    AEO strategy, content, and execution for SMBs.
  </text>

  <!-- Bottom orange chip with URL -->
  <rect x="640" y="395" width="220" height="42" rx="21" fill="url(#orangeRule)"/>
  <text x="750" y="422" text-anchor="middle"
        font-family="'Inter',sans-serif"
        font-weight="700" font-size="18" fill="#010F3B" letter-spacing="0.5">
    netwebmedia.com
  </text>
</svg>
