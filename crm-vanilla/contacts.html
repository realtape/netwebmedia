<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="contacts-layout">
        <div class="contacts-main">
          <div class="contacts-toolbar">
            <div class="search-input-wrap">
              <span class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input type="text" class="search-input" id="contactSearch" placeholder="Search contacts...">
            </div>
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="customer">Customers</button>
              <button class="filter-btn" data-filter="prospect">Prospects</button>
              <button class="filter-btn" data-filter="lead">Leads</button>
              <button class="filter-btn" data-filter="churned">Churned</button>
            </div>
          </div>
          <div class="contacts-table-wrap">
            <table class="contacts-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Company</th>
                  <th>Status</th>
                  <th>Value</th>
                  <th>Last Contact</th>
                </tr>
              </thead>
              <tbody id="contactsTableBody"></tbody>
            </table>
          </div>
        </div>
        <div class="contact-detail" id="contactDetail"></div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/contacts.js"></script>
</body>
</html>
