<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your Free Demo - NetWeb CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=8">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V71R6PD7C0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-V71R6PD7C0', { anonymize_ip: true });
  </script>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-gradient-line"></div>
    <div class="login-header">
      <div class="login-brand">
        <div class="brand-icon">N</div>
        <span class="login-brand-text">NetWeb CRM</span>
      </div>
      <h1 class="login-title" data-i18n="modules.login.title">Start Your Free Demo</h1>
      <p class="login-subtitle" data-i18n="modules.login.subtitle">Enter your details to explore the platform</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" id="tabSignup" data-tab="signup" data-i18n="modules.login.tabSignup">Start Free Demo</button>
      <button class="login-tab" id="tabSignin" data-tab="signin" data-i18n="modules.login.tabSignin">Sign In</button>
    </div>
    <form id="signupForm" class="login-form">
      <div id="signupError" class="login-error"></div>
      <div class="login-field">
        <label class="login-label" for="inputName" data-i18n="modules.login.fullName">Full Name</label>
        <input type="text" id="inputName" class="login-input" placeholder="John Smith" required autocomplete="name">
      </div>
      <div class="login-field">
        <label class="login-label" for="inputEmail" data-i18n="modules.login.emailAddress">Email Address</label>
        <input type="email" id="inputEmail" class="login-input" placeholder="john@company.com" required autocomplete="email">
      </div>
      <div class="login-field">
        <label class="login-label" for="inputCompany" data-i18n="modules.login.company">Company</label>
        <input type="text" id="inputCompany" class="login-input" placeholder="Acme Inc" autocomplete="organization">
      </div>
      <div class="login-field">
        <label class="login-label" for="inputPhone" data-i18n="modules.login.phone">Phone (optional)</label>
        <input type="tel" id="inputPhone" class="login-input" placeholder="+56 9 1234 5678" autocomplete="tel">
      </div>
      <button type="submit" id="signupBtn" class="login-btn" data-i18n="modules.login.launchDemo">Launch Demo</button>
    </form>
    <form id="signinForm" class="login-form login-form-hidden">
      <div id="signinError" class="login-error"></div>
      <div class="login-field">
        <label class="login-label" for="signinEmail" data-i18n="modules.login.emailAddress">Email Address</label>
        <input type="email" id="signinEmail" class="login-input" placeholder="john@company.com" required autocomplete="email">
      </div>
      <div class="login-field">
        <label class="login-label" for="signinPassword" data-i18n="modules.login.password">Password</label>
        <input type="password" id="signinPassword" class="login-input" data-i18n-placeholder="modules.login.pwPlaceholder" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" id="signinBtn" class="login-btn" data-i18n="modules.login.signIn">Sign In</button>
      <p class="login-forgot"><a href="#" data-i18n="modules.login.forgot">Forgot password?</a></p>
    </form>
    <div class="login-footer">
      <p class="login-terms" data-i18n="modules.login.terms">By continuing, you agree to our Terms of Service</p>
    </div>
  </div>
  <script src="js/app.js?v=8"></script>
  <script src="js/login.js?v=2"></script>
<script src="assets/nwm-i18n.js" defer></script>
</body>
</html>
