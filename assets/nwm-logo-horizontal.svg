<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 56" width="340" height="56">
  <!-- NWM circle badge: orange fill, white band, dark navy text -->
  <g transform="translate(28,28)">
    <circle cx="0" cy="0" r="27" fill="#F47920"/>
    <rect x="-27" y="-7" width="54" height="14" fill="#ffffff"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="'Arial Black',Arial,sans-serif"
          font-weight="900" font-size="13" fill="#1B2A4A"
          letter-spacing="0.5">NWM</text>
    <circle cx="0" cy="0" r="27" fill="none" stroke="#1B2A4A" stroke-width="2"/>
  </g>
  <!-- Wordmark: white / orange / white — readable on dark bg -->
  <text font-family="'Poppins','Montserrat',Arial,sans-serif"
        font-weight="800" font-size="28" y="36" x="66" letter-spacing="-0.5">
    <tspan fill="#ffffff">net</tspan><tspan fill="#F47920">web</tspan><tspan fill="#ffffff">media</tspan>
  </text>
</svg>
