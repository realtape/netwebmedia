name: Cron — Chile Cold Outreach (send-all mode)
# Schedule disabled — Chile campaign complete (3,693 sent, 0 pending as of 2026-05-01).
# Re-enable the `schedule:` block below to restart for a follow-up wave.
on:
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche key filter (optional, e.g. law_firms, beauty)'
        required: false
        default: ''
      batch:
        description: 'Max sends per call (default 3000, hard-capped at 5000)'
        required: false
        default: '3000'

concurrency:
  group: chile-cold-outreach
  cancel-in-progress: false

jobs:
  chile-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Send next batch
        run: |
          NICHE="${{ github.event.inputs.niche }}"
          BATCH="${{ github.event.inputs.batch || '3000' }}"
          # Token must be set as CHILE_SEND_TOKEN repo secret. No hardcoded
          # fallback — committing live tokens to YAML leaks them via git history.
          TOKEN="${{ secrets.CHILE_SEND_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "::error::CHILE_SEND_TOKEN secret is not set."
            echo "Set it with: gh secret set CHILE_SEND_TOKEN --repo netwebmedia/netwebmedia"
            exit 1
          fi
          # Token sent via X-Auth-Token HEADER (not querystring) so it's
          # not logged in InMotion access logs / referrers / browser history.
          URL="https://netwebmedia.com/api/chile-send?mode=batch&n=${BATCH}"
          if [ -n "$NICHE" ]; then
            URL="${URL}&niche=${NICHE}"
          fi
          # Full Chrome UA + Origin + Referer to bypass mod_security on InMotion.
          curl -s "$URL" \
            -H "X-Auth-Token: ${TOKEN}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Origin: https://netwebmedia.com" \
            -H "Referer: https://netwebmedia.com/crm-vanilla/chile-campaign.html" \
            --max-time 600 \
            -w "\nHTTP Status: %{http_code}\n"
