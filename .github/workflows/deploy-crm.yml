name: Deploy CRM to production

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (log only, no upload)"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - 'crm-vanilla/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.local.php from secrets
        run: |
          cat > crm-vanilla/api/config.local.php <<'EOF'
          <?php
          // Auto-generated during deploy. DO NOT EDIT.
          define('DB_PASS', '__DB_PASS__');
          define('HUBSPOT_TOKEN', '__HUBSPOT__');
          define('ANTHROPIC_API_KEY', '__ANTHROPIC__');
          define('RESEND_API_KEY', '__RESEND__');
          EOF
          sed -i "s|__DB_PASS__|${{ secrets.CRM_DB_PASSWORD }}|" crm-vanilla/api/config.local.php
          sed -i "s|__HUBSPOT__|${{ secrets.HUBSPOT_TOKEN }}|" crm-vanilla/api/config.local.php
          sed -i "s|__ANTHROPIC__|${{ secrets.ANTHROPIC_API_KEY }}|" crm-vanilla/api/config.local.php
          sed -i "s|__RESEND__|${{ secrets.RESEND_API_KEY }}|" crm-vanilla/api/config.local.php
          echo "Generated config.local.php ($(wc -c < crm-vanilla/api/config.local.php) bytes)"

      - name: Deploy crm-vanilla via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./crm-vanilla/
          local-dir: ./crm-vanilla/
          dry-run: ${{ github.event.inputs.dry-run == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log

      - name: Smoke test
        run: |
          echo "Testing CRM endpoints..."
          BASE="https://netwebmedia.com/companies/crm-vanilla"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          for path in "/" "/contacts.html" "/api/index.php?r=contacts" "/api/index.php?r=leads"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$path" -H "User-Agent: $UA")
            echo "  $path -> $STATUS"
          done
