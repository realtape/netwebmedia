<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#021046"/>
      <stop offset="100%" stop-color="#010A29"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="92%" r="60%">
      <stop offset="0%" stop-color="#FF671F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF671F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg5)"/>
  <rect width="1080" height="1350" fill="url(#glow5)"/>

  <rect x="80" y="92" width="26" height="26" rx="7" fill="#FF671F"/>
  <text x="122" y="113" font-family="'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="3" fill="#FFFFFF">NETWEBMEDIA</text>

  <text x="80" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6" fill="#FF671F">TURN IT ON</text>
  <text x="78" y="350" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="84" fill="#FFFFFF">3 steps, no</text>
  <text x="78" y="438" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="84" fill="#FFFFFF">tech team</text>

  <g font-family="'Helvetica Neue', Arial, sans-serif">
    <text x="80" y="600" font-size="120" font-weight="700" font-family="Georgia, serif" font-style="italic" fill="#FF671F">1</text>
    <text x="210" y="585" font-size="46" font-weight="600" fill="#FFFFFF">Add AI chat to your site.</text>

    <text x="80" y="760" font-size="120" font-weight="700" font-family="Georgia, serif" font-style="italic" fill="#FF671F">2</text>
    <text x="210" y="745" font-size="46" font-weight="600" fill="#FFFFFF">Connect it to your calendar.</text>

    <text x="80" y="920" font-size="120" font-weight="700" font-family="Georgia, serif" font-style="italic" fill="#FF671F">3</text>
    <text x="210" y="905" font-size="46" font-weight="600" fill="#FFFFFF">Set the follow-up messages.</text>
  </g>

  <rect x="80" y="1010" width="920" height="120" rx="22" fill="#0E2547" stroke="#FF671F" stroke-width="3"/>
  <text x="540" y="1086" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="52" fill="#F4F1EA">Set it once. It works <tspan fill="#FF671F">24/7.</tspan></text>

  <text x="80" y="1300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1" fill="#F4F1EA">@netwebmedia</text>
  <text x="1000" y="1300" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1" fill="#FF671F">save for later &#8594;</text>
  <text x="540" y="1300" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" letter-spacing="3" fill="#5E76A0">05 / 06</text>
</svg>
