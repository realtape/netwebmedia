<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - NetWeb CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../crm/css/app.css">
  <link rel="stylesheet" href="css/cms.css">
  <style>
    .nwm-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999}
    .nwm-modal{background:#fff;color:#111;border-radius:12px;width:min(680px,92vw);max-height:90vh;overflow:auto}
    .nwm-modal-head{display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eee}.nwm-modal-head h3{margin:0}
    .nwm-modal-close{background:none;border:none;font-size:28px;cursor:pointer}.nwm-modal-body{padding:20px}.nwm-modal-foot{margin-top:16px;display:flex;gap:8px;justify-content:flex-end}
    .lbl{display:block;margin-bottom:14px;font-size:13px;color:#444}.inp{display:block;width:100%;padding:10px 12px;border:1px solid #d5d9e2;border-radius:8px;font-size:14px;margin-top:4px}
    .mod-table th,.mod-table td{padding:10px 12px;border-bottom:1px solid #eee;text-align:left;font-size:14px}.mod-table th{background:#f7f7fb;font-size:12px;text-transform:uppercase;color:#666}
    .btn-sm{padding:4px 10px;font-size:12px}.btn-danger{background:#e74c3c;color:#fff}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
    .stat-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:14px}.stat-card .lbl{font-size:11px;color:#888;text-transform:uppercase}.stat-card .val{font-size:22px;font-weight:700;margin-top:4px}
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent">
      <header class="page-header" id="pageHeader"></header>
      <div class="page-body"><div id="stats" class="stat-grid"></div><div id="list"></div></div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/cms.js"></script>
  <script src="js/module-table.js"></script>
  <script>
    function renderStats(items) {
      var pub = 0, dr = 0, sc = 0;
      items.forEach(function (it) {
        if (it.status === 'published') pub++;
        else if (it.status === 'draft') dr++;
        else if (it.status === 'scheduled') sc++;
      });
      document.getElementById('stats').innerHTML =
        '<div class="stat-card"><div class="lbl">Total posts</div><div class="val">' + items.length + '</div></div>' +
        '<div class="stat-card"><div class="lbl">Published</div><div class="val">' + pub + '</div></div>' +
        '<div class="stat-card"><div class="lbl">Drafts</div><div class="val">' + dr + '</div></div>' +
        '<div class="stat-card"><div class="lbl">Scheduled</div><div class="val">' + sc + '</div></div>';
    }

    NWMApi.list('blog_post').then(function (r) { renderStats(r.items || []); }).catch(function(){});

    NWM.mount({
      type: 'blog_post',
      title: 'Blog',
      subtitle: 'Draft, schedule and manage blog posts',
      listEl: 'list',
      columns: [
        { label: 'Title', key: 'title' },
        { label: 'Tag', key: 'tag' },
        { label: 'Status', key: 'status' },
        { label: 'Author', key: 'author' },
        { label: 'Updated', key: 'updated_at' },
      ],
      rowActions: [
        { act: 'open', label: 'Open' },
      ],
      onRow: function (act, it) {
        if (act === 'open') {
          var slug = (it.data && it.data.slug) || it.slug;
          if (slug) window.open('/blog/' + slug + '.html', '_blank');
          else alert('No slug set for this post yet.');
        }
      },
      fields: [
        { name: 'title', label: 'Post title', type: 'text', required: true },
        { name: 'slug', label: 'Slug (e.g. my-post)', type: 'text', placeholder: 'my-post' },
        { name: 'tag', label: 'Tag / category', type: 'text' },
        { name: 'author', label: 'Author', type: 'text' },
        { name: 'read_time', label: 'Read time', type: 'text', placeholder: '5 min' },
        { name: 'excerpt', label: 'Excerpt', type: 'textarea', rows: 4 },
        { name: 'status', label: 'Status', type: 'select', options: [
          { value: 'draft', label: 'Draft' }, { value: 'published', label: 'Published' },
          { value: 'scheduled', label: 'Scheduled' }, { value: 'archived', label: 'Archived' },
        ]},
      ],
    });
  </script>
<script src="assets/nwm-i18n.js?v=2" defer></script>
</body>
</html>
