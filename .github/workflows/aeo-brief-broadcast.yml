name: aeo-brief-broadcast

# Sends the weekly AEO Brief via AWS SES.
#
# Schedule: Tuesdays at 12:00 UTC (= 09:00 Chile / 06:00 PT / 09:00 ET)
# Manual fire: any time via workflow_dispatch
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID        — IAM user with ses:SendEmail permission
#   AWS_SECRET_ACCESS_KEY    — its secret key
#   AWS_REGION               — e.g. us-east-1
#   SES_FROM_EMAIL           — verified sender (e.g. carlos@netwebmedia.com)
#   SES_REPLY_TO             — optional, defaults to FROM_EMAIL
#   SUBSCRIBERS_S3_BUCKET    — S3 bucket holding subscribers.csv (private)
#   SUBSCRIBERS_S3_KEY       — e.g. exports/email-subscribers-latest.csv
#
# Why S3 for the subscriber list:
#   Storing the subscriber list in the repo would commit PII to git history.
#   Instead, export from the DB to a private S3 bucket on cron, and have this
#   workflow pull the latest at send time. Bucket should have lifecycle rules
#   to delete CSVs older than 90 days.
#
# Setup checklist before this workflow runs:
#   1. SES production access granted (see scripts/email-broadcast/SES-SETUP.md)
#   2. Sender domain DKIM-verified
#   3. All 7 secrets above set in repo settings
#   4. subscribers.csv exported to S3 (or use dispatch input to provide URL)
#   5. The brief HTML is committed at email-templates/aeo-brief-NNN-*.html

on:
  # Tuesdays at 12:00 UTC = 09:00 Chile.
  # During Chilean summer-time (Oct-Mar), Chile is UTC-3, so 12:00 UTC = 09:00.
  # During Chilean winter-time (Apr-Sep), Chile is UTC-4, so 13:00 UTC = 09:00.
  # We split the difference and fire at 12:00 UTC year-round — it's between
  # 08:00 and 09:00 Chile depending on the season. Still in business hours.
  schedule:
    - cron: '0 12 * * 2'

  workflow_dispatch:
    inputs:
      brief_file:
        description: 'Path to brief HTML relative to repo root'
        required: true
        default: 'email-templates/aeo-brief-002-jsonld.html'
      brief_subject:
        description: 'Email subject line'
        required: true
        default: 'The 3 lines of JSON-LD most law firms are missing'
      brief_primary_url:
        description: 'Primary CTA URL (with UTM params)'
        required: false
        default: 'https://netwebmedia.com/aeo-index.html?utm_source=aeo-brief&utm_medium=email&utm_campaign=brief-002'
      brief_primary_cta_en:
        description: 'Primary CTA label (English)'
        required: false
        default: 'Run my AEO check (60 seconds)'
      brief_primary_cta_es:
        description: 'Primary CTA label (Spanish)'
        required: false
        default: 'Correr mi chequeo AEO (60 segundos)'
      dry_run:
        description: 'Dry run (skip actual send, just generate preview)'
        type: boolean
        required: false
        default: false

concurrency:
  group: aeo-brief-broadcast
  cancel-in-progress: false

jobs:
  broadcast:
    name: Send AEO Brief via SES
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS SDK SESv2 (no other deps needed)
        working-directory: scripts/email-broadcast
        run: |
          # Pinned version — change deliberately to avoid silent regressions.
          npm init -y > /dev/null
          npm install --no-save @aws-sdk/client-sesv2@^3.700.0 \
                                 @aws-sdk/client-s3@^3.700.0

      - name: Fetch latest subscriber CSV from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BUCKET: ${{ secrets.SUBSCRIBERS_S3_BUCKET }}
          KEY: ${{ secrets.SUBSCRIBERS_S3_KEY }}
        run: |
          if [ -z "$BUCKET" ] || [ -z "$KEY" ]; then
            echo "::error::SUBSCRIBERS_S3_BUCKET and SUBSCRIBERS_S3_KEY must be set"
            echo "  → Settings > Secrets and variables > Actions"
            echo "  → For testing, you can replace this step with a direct CSV upload via workflow inputs"
            exit 1
          fi
          aws s3 cp "s3://${BUCKET}/${KEY}" scripts/email-broadcast/subscribers.csv
          echo "Loaded $(wc -l < scripts/email-broadcast/subscribers.csv) lines (including header)"

      - name: Send AEO Brief broadcast
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SES_FROM_NAME: ${{ secrets.SES_FROM_NAME || 'Carlos · NetWebMedia' }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          SES_REPLY_TO: ${{ secrets.SES_REPLY_TO || 'hello@netwebmedia.com' }}
          SES_CONFIG_SET: ${{ secrets.SES_CONFIG_SET }}
          SUBSCRIBERS_CSV: scripts/email-broadcast/subscribers.csv
          BRIEF_HTML: ${{ inputs.brief_file || 'email-templates/aeo-brief-002-jsonld.html' }}
          BRIEF_BASE_HTML: email-templates/_base.html
          BRIEF_SUBJECT: ${{ inputs.brief_subject || 'The 3 lines of JSON-LD most law firms are missing' }}
          BRIEF_PRIMARY_URL: ${{ inputs.brief_primary_url || 'https://netwebmedia.com/aeo-index.html?utm_source=aeo-brief&utm_medium=email&utm_campaign=brief-002' }}
          BRIEF_PRIMARY_CTA_EN: ${{ inputs.brief_primary_cta_en || 'Run my AEO check (60 seconds)' }}
          BRIEF_PRIMARY_CTA_ES: ${{ inputs.brief_primary_cta_es || 'Correr mi chequeo AEO (60 segundos)' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: |
          if [ -z "$SES_FROM_EMAIL" ]; then
            echo "::error::SES_FROM_EMAIL must be set as a repo secret"
            echo "  → e.g. carlos@netwebmedia.com (must be verified in SES)"
            exit 1
          fi
          echo "Broadcasting $BRIEF_HTML"
          echo "  Subject: $BRIEF_SUBJECT"
          echo "  From:    $SES_FROM_NAME <$SES_FROM_EMAIL>"
          echo "  Dry run: ${DRY_RUN:-no}"
          node scripts/email-broadcast/send-aeo-brief-ses.js

      - name: Upload preview as artifact (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aeo-brief-preview-${{ github.run_number }}
          path: scripts/email-broadcast/_preview.html
          if-no-files-found: ignore
          retention-days: 30

      - name: Report failure to Slack (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_OPS_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "::warning::SLACK_OPS_WEBHOOK not set — skipping notification"
            exit 0
          fi
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 *AEO Brief broadcast FAILED* on Tuesday cron\\n_Run:_ ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n_Likely causes:_ SES rate limit, suspended account, subscriber CSV missing, or sender unverified.\"}" \
            "$SLACK_WEBHOOK" || echo "::warning::Slack notification failed"
