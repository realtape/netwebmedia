<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Gulf Blue outer ring -->
  <circle cx="256" cy="256" r="250" fill="#003B80"/>
  <!-- White ring gap -->
  <circle cx="256" cy="256" r="238" fill="#ffffff"/>
  <!-- Gulf Orange fill -->
  <circle cx="256" cy="256" r="230" fill="#FF6600"/>
  <!-- White center band: 120px tall, centered at 256 -->
  <rect x="26" y="196" width="460" height="120" fill="#ffffff"/>
  <!-- NWM text in Gulf Blue -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900" font-size="115" fill="#003B80"
        letter-spacing="4">NWM</text>
  <!-- Gulf Blue outer stroke -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#003B80" stroke-width="12"/>
  <!-- White inner stroke -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#ffffff" stroke-width="4"/>
</svg>
